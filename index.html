<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>維恩計畫 V50 MODERN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --primary: #6366F1;
            --secondary: #A855F7;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* 頂部導覽與月份切換 */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); }
        .month-selector {
            background: var(--surface);
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 5px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            outline: none;
        }

        /* 側邊選單 */
        #sideNav {
            position: fixed;
            left: -100%;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--surface);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sideNav.open { left: 0; }
        .nav-item {
            padding: 18px;
            margin-bottom: 10px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item.active { background: var(--primary); color: white; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1500;
        }

        /* 狀態卡片 (SPA 頁面容器) */
        .container { padding: 20px; max-width: 500px; margin: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .page { display: none; }
        .page.active { display: block; }

        .status-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        .status-val { font-family: 'Montserrat'; font-size: 42px; font-weight: 900; }

        /* 預算卡片 */
        .section-header { font-size: 13px; font-weight: 900; color: var(--text-sub); margin: 25px 0 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .card { 
            background: var(--surface); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .progress-bg { height: 6px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* 快速記帳面板 */
        .quick-panel { background: #1E293B; border-radius: 32px; padding: 25px; border: 2px solid var(--primary); margin-bottom: 30px; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .cat-item { 
            background: #334155; border-radius: 16px; padding: 12px 5px; text-align: center; 
            font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .cat-item.active { background: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        .amt-box { background: rgba(15, 23, 42, 0.5); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .amt-input { width: 100%; border: none; font-family: 'Montserrat'; font-size: 40px; font-weight: 900; color: var(--primary); text-align: center; background: transparent; outline: none; }
        
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pay-btn { background: #334155; border-radius: 14px; padding: 14px; font-weight: 700; font-size: 13px; text-align: center; cursor: pointer; transition: 0.2s; }
        .pay-btn.active { background: var(--success); color: white; }

        .submit-btn { 
            width: 100%; padding: 20px; border-radius: 20px; background: var(--primary); color: white; 
            font-weight: 900; font-size: 18px; border: none; margin-top: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* 存錢標籤 */
        .tag-fixed { background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .tag-inf { background: rgba(168, 85, 247, 0.1); color: var(--secondary); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }

        /* 明細項目與刪除 */
        .history-item { 
            background: var(--surface); margin-bottom: 10px; padding: 18px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
        }
        .del-btn { color: var(--danger); font-size: 12px; font-weight: 900; background: rgba(239, 68, 68, 0.1); padding: 8px 12px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sideNav">
    <div style="margin-bottom:40px;"><h2 style="color:var(--primary); margin:0;">維恩計畫</h2><p style="color:var(--text-sub); font-size:12px;">V50 Modern App</p></div>
    <div class="nav-item active" onclick="switchPage('main', this)">🏠 儀表板看板</div>
    <div class="nav-item" onclick="switchPage('history', this)">📝 消費明細紀錄</div>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<div class="top-nav">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div style="font-weight:900;">MARCH PLAN</div>
    <select id="monthPicker" class="month-selector" onchange="changeMonth()">
        <option value="1">1月</option><option value="2">2月</option><option value="3" selected>3月</option>
        <option value="4">4月</option><option value="5">5月</option>
    </select>
</div>

<div class="container">
    <div id="mainPage" class="page active">
        <div class="status-card">
            <div id="daysLeft" style="font-size:14px; font-weight:700; margin-bottom:10px; opacity:0.8;">LOADING...</div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div><small style="font-weight:700; opacity:0.7;">本月可用餘額</small><br><span id="totalAvailable" class="status-val">$0</span></div>
                <div style="text-align:right;"><span style="font-weight:900; color:rgba(255,255,255,0.5)">SAFE</span></div>
            </div>
        </div>

        <div class="section-header">📊 預算監控</div>
        <div id="budgetArea"></div>

        <div class="section-header">✍️ 快速記帳</div>
        <div class="quick-panel">
            <div class="cat-grid">
                <div class="cat-item active" onclick="changeCat('food', this)">🍽️ 食物</div>
                <div class="cat-item" onclick="changeCat('fun', this)">🎯 娛樂</div>
                <div class="cat-item" onclick="changeCat('taffi', this)">🐶 Taffi</div>
                <div class="cat-item" onclick="changeCat('fixed', this)">日常</div>
            </div>
            <div class="amt-box">
                <input type="text" id="itemName" style="width:100%; border:none; color:white; font-size:16px; font-weight:700; text-align:center; outline:none; background:transparent;" placeholder="輸入消費內容">
                <input type="number" id="itemAmt" class="amt-input" placeholder="0">
            </div>
            <div class="pay-grid">
                <div class="pay-btn" onclick="setPay('cash', this)">💵 現金</div>
                <div class="pay-btn" onclick="setPay('cathay', this)">💳 國泰</div>
                <div class="pay-btn" onclick="setPay('taishin', this)">💳 台新</div>
                <div class="pay-btn" onclick="setPay('fubon', this)">💳 富邦</div>
            </div>
            <button class="submit-btn" onclick="submitExpense()">確認送出紀錄</button>
        </div>

        <div class="section-header">💳 信用卡負債</div>
        <div id="bankArea"></div>

        <div class="section-header">🏦 存錢目標計畫</div>
        <div id="saveArea"></div>
    </div>

    <div id="historyPage" class="page">
        <div class="section-header">📜 當月消費明細 (點擊刪除可還原)</div>
        <div id="historyList"></div>
        <button class="submit-btn" style="background:var(--surface)" onclick="switchPage('main')">返回儀表板</button>
    </div>
</div>

<script>
    let currentMonth = "3";
    let currentCat = 'food';
    let currentPay = '';

    let db = JSON.parse(localStorage.getItem("taffi_v50")) || {
        months: {
            "3": { 
                budgets: { 
                    food: {goal:9000, spent:0, sub:"每月伙食開銷", icon:"🍽️"}, 
                    fun: {goal:5000, spent:0, sub:"美甲、羽球、購物", icon:"🎯"}, 
                    taffi: {goal:3000, spent:0, sub:"飼料、美容、零食", icon:"🐶"}, 
                    fixed: {goal:1300, spent:0, sub:"電信、Gogoro、iCloud", icon:"🏠"} 
                },
                history: []
            }
        },
        banks: {
            cathay: { name: "國泰世華", bal: 0, color: "#10B981" },
            taishin: { name: "台新(鎖)", bal: 0, color: "#EF4444" },
            fubon: { name: "富邦銀行", bal: 0, color: "#007AFF" }
        },
        savings: [
            { name: "眉毛美容", target: 4500, bal: 0, type: "fixed" },
            { name: "機車保養", target: 3000, bal: 0, type: "fixed" },
            { name: "年度保險", target: 12000, bal: 0, type: "fixed" },
            { name: "旅遊金", target: "無限存", bal: 0, type: "inf" },
            { name: "Taffi 存款", target: "無限存", bal: 0, type: "inf" }
        ]
    };

    function render() {
        let mData = db.months[currentMonth] || { budgets: {}, history: [] };
        let totalRem = 0;
        
        // 預算監控
        let bHtml = "";
        for(let k in mData.budgets) {
            let b = mData.budgets[k];
            let rem = b.goal - b.spent;
            totalRem += rem;
            let ratio = (b.spent / b.goal) * 100;
            let color = `hsl(${Math.max(260 - (ratio * 1.6), 0)}, 70%, 60%)`; // 從紫變紅
            bHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:16px;">${b.icon} ${k.toUpperCase()}</b><br><small style="color:var(--text-sub)">${b.sub}</small></div>
                    <div style="text-align:right;"><span style="font-family:'Montserrat'; font-weight:900; font-size:22px; color:white;">$${rem.toLocaleString()}</span></div>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(ratio, 100)}%; background:${color}"></div></div>
            </div>`;
        }
        document.getElementById('budgetArea').innerHTML = bHtml;
        document.getElementById('totalAvailable').innerText = "$" + totalRem.toLocaleString();

        // 信用卡負債
        let bankHtml = "";
        for(let k in db.banks) {
            let b = db.banks[k];
            bankHtml += `<div class="card" style="padding:15px 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--text-sub)">${b.name}</b>
                    <span style="font-family:'Montserrat'; font-weight:900; color:white;">$${b.bal.toLocaleString()}</span>
                </div>
            </div>`;
        }
        document.getElementById('bankArea').innerHTML = bankHtml;

        // 存錢目標
        let sHtml = "";
        db.savings.forEach(s => {
            sHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><span class="${s.type === 'fixed' ? 'tag-fixed' : 'tag-inf'}">${s.type === 'fixed' ? '固定存' : '無限存'}</span><br><b style="font-size:16px;">${s.name}</b></div>
                    <span style="font-family:'Montserrat'; font-weight:900; font-size:20px; color:var(--primary)">$${s.bal.toLocaleString()}</span>
                </div>
            </div>`;
        });
        document.getElementById('saveArea').innerHTML = sHtml;

        // 明細渲染
        let hHtml = "";
        mData.history.forEach((h, idx) => {
            hHtml += `<div class="history-item">
                <div><b style="font-size:16px;">${h.name}</b><br><small style="color:var(--text-sub)">${h.time} | ${h.payName}</small></div>
                <div style="text-align:right;"><b style="color:var(--danger); font-family:'Montserrat';">-$${h.amt.toLocaleString()}</b><br><span class="del-btn" onclick="deleteItem(${idx})">刪除</span></div>
            </div>`;
        });
        document.getElementById('historyList').innerHTML = hHtml || "<p style='text-align:center; padding:20px;'>NO RECORDS</p>";

        // 天數計算
        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        document.getElementById('daysLeft').innerText = `本月剩餘 ${lastDay - now.getDate()} 天`;
    }

    function deleteItem(idx) {
        if(!confirm("確定要刪除這筆紀錄並加回預算嗎？")) return;
        let item = db.months[currentMonth].history[idx];
        db.months[currentMonth].budgets[item.cat].spent -= item.amt;
        if(item.pay !== 'cash') db.banks[item.pay].bal -= item.amt;
        db.months[currentMonth].history.splice(idx, 1);
        saveAndRender();
    }

    function submitExpense() {
        let a = Number(document.getElementById('itemAmt').value);
        let n = document.getElementById('itemName').value || "未命名消費";
        if(!a || !currentPay) return alert("請輸入金額與支付方式");
        
        const payNames = {cash:'現金', cathay:'國泰', taishin:'台新', fubon:'富邦'};
        db.months[currentMonth].budgets[currentCat].spent += a;
        if(currentPay !== 'cash') db.banks[currentPay].bal += a;
        
        db.months[currentMonth].history.unshift({ 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            name: n, amt: a, cat: currentCat, pay: currentPay, payName: payNames[currentPay]
        });
        
        document.getElementById('itemAmt').value = ""; document.getElementById('itemName').value = "";
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem("taffi_v50", JSON.stringify(db)); render(); }
    function switchPage(p, el) { 
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(document.getElementById('sideNav').classList.contains('open')) toggleMenu();
    }
    function toggleMenu() { 
        document.getElementById('sideNav').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sideNav').classList.contains('open') ? 'block' : 'none';
    }
    function changeCat(c, el) { currentCat = c; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function setPay(p, el) { currentPay = p; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function changeMonth() { currentMonth = document.getElementById('monthPicker').value; render(); }

    render();
</script>
</body>
</html>
