<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>維恩計畫 V52 INTERACTIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #6366F1;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }

        .top-nav {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 15px 20px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .month-selector { border: none; background: #EEF2FF; color: var(--primary); padding: 6px 12px; border-radius: 12px; font-weight: 900; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 核心卡片 */
        .status-card {
            background: var(--surface); border-radius: 25px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--border); border-left: 6px solid var(--primary);
        }
        .status-val { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--primary); }

        /* 通用卡片樣式 */
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .section-header { font-size: 13px; font-weight: 900; color: var(--text-sub); margin: 25px 0 12px 5px; letter-spacing: 1px; }

        /* 預算進度條 */
        .progress-bg { height: 8px; background: #F1F5F9; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; }

        /* 動作按鈕 */
        .action-btn { 
            padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; 
            border: none; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }
        .btn-repay { background: #F0FDF4; color: var(--success); }
        .btn-save { background: #EEF2FF; color: var(--primary); }

        /* 快速記帳 */
        .quick-panel { background: #FFFFFF; border-radius: 25px; padding: 20px; border: 1px solid var(--primary); margin-bottom: 20px; }
        .cat-grid { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .cat-item { background: var(--bg); border-radius: 12px; padding: 8px 15px; white-space: nowrap; font-weight: 800; font-size: 12px; border: 1px solid var(--border); cursor: pointer; }
        .cat-item.active { background: var(--primary); color: white; }

        .amt-input { width: 100%; border: none; font-family: 'Montserrat'; font-size: 36px; font-weight: 900; color: var(--primary); text-align: center; background: transparent; outline: none; }
        
        .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .pay-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 2px; font-weight: 800; font-size: 11px; text-align: center; cursor: pointer; }
        .pay-btn.active { background: var(--text-main); color: white; }

        .submit-btn { width: 100%; padding: 16px; border-radius: 15px; background: var(--primary); color: white; font-weight: 900; border: none; margin-top: 15px; cursor: pointer; }

        /* 明細項目 */
        .history-item { 
            background: var(--surface); margin-bottom: 8px; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .type-tag { font-size: 10px; padding: 2px 6px; border-radius: 5px; font-weight: 900; margin-right: 5px; }
        .tag-expense { background: #FEE2E2; color: var(--danger); }
        .tag-repay { background: #DCFCE7; color: var(--success); }
        .tag-save { background: #DBEAFE; color: var(--primary); }

        /* 彈出視窗 */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; z-index: 3000;
            width: 85%; max-width: 350px; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; display: none; }

        /* 導覽列 */
        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--border);
        }
        .tab { font-size: 12px; font-weight: 900; color: var(--text-sub); cursor: pointer; }
        .tab.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-weight:900; color:var(--text-main);">維恩計畫 V52</div>
    <select id="monthPicker" class="month-selector" onchange="changeMonth()">
        <option value="3" selected>3月預算</option><option value="4">4月預算</option>
    </select>
</div>

<div class="container">
    <div id="mainPage" class="page active">
        <div class="status-card">
            <div id="daysLeft" style="font-size:12px; font-weight:800; color:var(--text-sub);"></div>
            <div id="totalAvailable" class="status-val">$0</div>
            <small style="color:var(--text-sub); font-weight:700;">剩餘總預算</small>
            <div id="dailyAllowance" style="color:var(--success); font-weight:800; font-size:13px; margin-top:5px;"></div>
        </div>

        <div class="section-header">📊 預算監控</div>
        <div id="budgetArea"></div>

        <div class="section-header">✍️ 快速記帳</div>
        <div class="quick-panel">
            <div class="cat-grid">
                <div class="cat-item active" onclick="changeCat('food', this)">🍽️ 食物</div>
                <div class="cat-item" onclick="changeCat('fun', this)">🎯 娛樂</div>
                <div class="cat-item" onclick="changeCat('taffi', this)">🐶 Taffi</div>
                <div class="cat-item" onclick="changeCat('fixed', this)">日常</div>
            </div>
            <div class="amt-box">
                <input type="text" id="itemName" style="width:100%; border:none; color:var(--text-main); font-size:14px; font-weight:700; text-align:center; outline:none; background:transparent;" placeholder="輸入消費內容...">
                <input type="number" id="itemAmt" class="amt-input" placeholder="0">
            </div>
            <div class="pay-grid">
                <div class="pay-btn" onclick="setPay('cash', this)">💵 現金</div>
                <div class="pay-btn" onclick="setPay('cathay', this)">💳 國泰</div>
                <div class="pay-btn" onclick="setPay('taishin', this)">💳 台新</div>
                <div class="pay-btn" onclick="setPay('fubon', this)">💳 富邦</div>
            </div>
            <button class="submit-btn" onclick="submitExpense()">送出消費紀錄</button>
        </div>

        <div class="section-header">💳 信用卡還款 (慢慢還)</div>
        <div id="bankArea"></div>

        <div class="section-header">🏦 存錢累積</div>
        <div id="saveArea"></div>
    </div>

    <div id="historyPage" class="page">
        <div class="section-header">📜 往來明細 (含消費、還款、存款)</div>
        <div id="historyList"></div>
    </div>
</div>

<div id="modalOverlay"></div>
<div id="actionModal" class="modal">
    <h3 id="modalTitle" style="margin-top:0;">標題</h3>
    <p id="modalSub" style="font-size:12px; color:var(--text-sub);"></p>
    <input type="number" id="modalAmt" class="amt-input" style="font-size:32px; border-bottom:2px solid var(--primary); margin: 20px 0;" placeholder="0">
    <div style="display:flex; gap:10px;">
        <button class="submit-btn" style="margin:0; background:#F1F5F9; color:var(--text-main);" onclick="closeModal()">取消</button>
        <button id="modalConfirmBtn" class="submit-btn" style="margin:0;">確認執行</button>
    </div>
</div>

<div class="bottom-bar">
    <div class="tab active" onclick="switchPage('main', this)">🏠 儀表板</div>
    <div class="tab" onclick="switchPage('history', this)">📝 往來明細</div>
</div>

<script>
    let currentMonth = "3";
    let currentCat = 'food';
    let currentPay = '';
    let activeAction = {}; // 暫存目前正在還款或存款的對象

    let db = JSON.parse(localStorage.getItem("taffi_v52")) || {
        months: {
            "3": { 
                budgets: { 
                    food: {goal:9000, spent:0, sub:"每月伙食", icon:"🍽️", details:""}, 
                    fun: {goal:4000, spent:0, sub:"娛樂", icon:"🎯", details:"美甲、羽球、健身"}, 
                    taffi: {goal:3000, spent:0, sub:"Taffi", icon:"🐶", details:"飼料、美容"}, 
                    fixed: {goal:1300, spent:0, sub:"日常", icon:"🏠", details:"電信、Gogoro"} 
                },
                history: []
            }
        },
        banks: {
            cathay: { name: "國泰世華", limit: 60000, bal: 56570, color: "#22C55E" },
            taishin: { name: "台新銀行", limit: 50000, bal: 22000, color: "#EF4444" },
            fubon: { name: "富邦銀行", limit: 50000, bal: 36773, color: "#F59E0B" }
        },
        savings: [
            { id: 0, name: "眉毛美容", target: 4500, bal: 0, type: "fixed" },
            { id: 1, name: "機車保養", target: 3000, bal: 0, type: "fixed" },
            { id: 2, name: "年度保險", target: 12000, bal: 0, type: "fixed" },
            { id: 3, name: "旅遊金", target: "無限存", bal: 0, type: "inf" },
            { id: 4, name: "Taffi 存款", target: "無限存", bal: 0, type: "inf" }
        ]
    };

    function render() {
        let mData = db.months[currentMonth] || { budgets: {}, history: [] };
        let totalRem = 0;
        
        // 預算
        let bHtml = "";
        for(let k in mData.budgets) {
            let b = mData.budgets[k];
            let rem = b.goal - b.spent;
            totalRem += rem;
            let ratio = Math.min((b.spent / b.goal) * 100, 100);
            bHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <b>${b.icon} ${k.toUpperCase()}</b>
                    <b style="font-family:Montserrat">$${rem.toLocaleString()}</b>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${ratio}%; background:${ratio > 90 ? 'var(--danger)':'var(--primary)'}"></div></div>
                <div style="font-size:11px; color:var(--text-sub)">${b.details || b.sub}</div>
            </div>`;
        }
        document.getElementById('budgetArea').innerHTML = bHtml;
        document.getElementById('totalAvailable').innerText = "$" + totalRem.toLocaleString();

        // 銀行還款
        let bankHtml = "";
        for(let k in db.banks) {
            let b = db.banks[k];
            bankHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:15px;">${b.name}</b><br><small style="color:var(--text-sub)">剩餘負債: $${b.bal.toLocaleString()}</small></div>
                    <button class="action-btn btn-repay" onclick="openActionModal('repay', '${k}')">💸 還款</button>
                </div>
            </div>`;
        }
        document.getElementById('bankArea').innerHTML = bankHtml;

        // 存款目標
        let sHtml = "";
        db.savings.forEach((s, idx) => {
            sHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${s.name}</b><br><small style="color:var(--text-sub)">目前累計: $${s.bal.toLocaleString()}</small></div>
                    <button class="action-btn btn-save" onclick="openActionModal('save', ${idx})">💰 存入</button>
                </div>
            </div>`;
        });
        document.getElementById('saveArea').innerHTML = sHtml;

        // 明細
        let hHtml = "";
        mData.history.forEach((h, idx) => {
            let tag = h.type === 'repay' ? '<span class="type-tag tag-repay">還款</span>' : h.type === 'save' ? '<span class="type-tag tag-save">存款</span>' : '<span class="type-tag tag-expense">支出</span>';
            let color = h.type === 'expense' ? 'var(--danger)' : 'var(--success)';
            let sign = h.type === 'expense' ? '-' : '+';
            hHtml += `<div class="history-item">
                <div>${tag}<b>${h.name}</b><br><small style="color:var(--text-sub)">${h.time} | ${h.payName || ''}</small></div>
                <div style="text-align:right;"><b style="color:${color}; font-family:Montserrat">${sign}$${h.amt.toLocaleString()}</b><br><span style="font-size:10px; color:var(--text-sub); cursor:pointer" onclick="deleteItem(${idx})">撤銷</span></div>
            </div>`;
        });
        document.getElementById('historyList').innerHTML = hHtml || "<p style='text-align:center; padding:20px;'>尚無紀錄</p>";

        // 日均
        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate() + 1;
        document.getElementById('daysLeft').innerText = `距離月底還有 ${daysLeft-1} 天`;
        document.getElementById('dailyAllowance').innerText = `今日預算：$${Math.floor(totalRem/daysLeft).toLocaleString()}`;
    }

    // 彈窗邏輯
    function openActionModal(type, target) {
        activeAction = { type, target };
        const modal = document.getElementById('actionModal');
        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const sub = document.getElementById('modalSub');
        
        if(type === 'repay') {
            title.innerText = "信用卡還款";
            sub.innerText = "正在為 " + db.banks[target].name + " 繳款";
        } else {
            title.innerText = "存入目標金額";
            sub.innerText = "存入項目：" + db.savings[target].name;
        }
        
        modal.style.display = 'block';
        overlay.style.display = 'block';
        document.getElementById('modalConfirmBtn').onclick = confirmAction;
    }

    function confirmAction() {
        const amt = Number(document.getElementById('modalAmt').value);
        if(!amt) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if(activeAction.type === 'repay') {
            db.banks[activeAction.target].bal -= amt;
            db.months[currentMonth].history.unshift({ type: 'repay', name: db.banks[activeAction.target].name + "還款", amt: amt, time: time });
        } else {
            db.savings[activeAction.target].bal += amt;
            db.months[currentMonth].history.unshift({ type: 'save', name: db.savings[activeAction.target].name + "存款", amt: amt, time: time });
        }
        
        document.getElementById('modalAmt').value = "";
        closeModal();
        saveAndRender();
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // 基礎記帳功能
    function submitExpense() {
        let a = Number(document.getElementById('itemAmt').value);
        let n = document.getElementById('itemName').value || "日常支出";
        if(!a || !currentPay) return alert("請選擇支付方式與金額");
        
        db.months[currentMonth].budgets[currentCat].spent += a;
        if(currentPay !== 'cash') db.banks[currentPay].bal += a;
        
        db.months[currentMonth].history.unshift({ 
            type: 'expense', name: n, amt: a, cat: currentCat, pay: currentPay, payName: currentPay==='cash'?'現金':db.banks[currentPay].name,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        
        document.getElementById('itemAmt').value = "";
        saveAndRender();
    }

    function deleteItem(idx) {
        if(!confirm("確定要撤銷這筆紀錄嗎？(金額將自動退回)")) return;
        let h = db.months[currentMonth].history[idx];
        if(h.type === 'expense') {
            db.months[currentMonth].budgets[h.cat].spent -= h.amt;
            if(h.pay !== 'cash') db.banks[h.pay].bal -= h.amt;
        } else if(h.type === 'repay') {
            // 還款撤銷，負債要加回去
            // 先找出這是哪家銀行的還款 (這裡用名稱判斷比較簡單)
            for(let k in db.banks) { if(h.name.includes(db.banks[k].name)) db.banks[k].bal += h.amt; }
        } else if(h.type === 'save') {
            // 存款撤銷，儲蓄要減掉
            for(let s of db.savings) { if(h.name.includes(s.name)) s.bal -= h.amt; }
        }
        db.months[currentMonth].history.splice(idx, 1);
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem("taffi_v52", JSON.stringify(db)); render(); }
    function switchPage(p, el) { 
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function changeCat(c, el) { currentCat = c; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function setPay(p, el) { currentPay = p; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function changeMonth() { currentMonth = document.getElementById('monthPicker').value; render(); }

    render();
</script>
</body>
</html>
