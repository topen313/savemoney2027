<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>維恩計畫 V55 PREMIUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #6366F1;
            --primary-light: #EEF2FF;
            --success: #10B981;
            --danger: #F43F5E;
            --warning: #F59E0B;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; }

        .top-nav {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px); padding: 12px 20px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .month-selector { border: none; background: var(--primary-light); color: var(--primary); padding: 8px 16px; border-radius: 14px; font-weight: 900; font-size: 14px; outline: none; }

        .container { padding: 16px; max-width: 500px; margin: auto; }
        .page { display: none; animation: pageIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 頂部預算卡片 */
        .status-card {
            background: var(--surface); border-radius: 28px; padding: 24px;
            margin-bottom: 24px; box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.8); position: relative; overflow: hidden;
        }
        .status-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 6px; background: var(--primary); }
        .status-val { font-family: 'Montserrat'; font-size: 38px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        .card { background: var(--surface); border-radius: 22px; padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); }
        .section-header { font-size: 13px; font-weight: 900; color: var(--text-sub); margin: 28px 0 14px 6px; letter-spacing: 1.5px; text-transform: uppercase; }

        /* 進度條動畫 */
        .progress-bg { height: 10px; background: #F1F5F9; border-radius: 20px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 20px; width: 0; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s; }
        
        /* 快速記帳區 */
        .quick-panel { background: var(--surface); border-radius: 28px; padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
        .cat-item { background: #F8FAFC; border-radius: 16px; padding: 12px 5px; text-align: center; font-weight: 800; font-size: 12px; border: 1px solid var(--border); transition: 0.2s; }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.2); }
        
        .sub-cat-grid { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 18px; padding-bottom: 5px; }
        .sub-cat-grid::-webkit-scrollbar { display: none; }
        .sub-item { background: var(--primary-light); border-radius: 12px; padding: 8px 16px; font-size: 12px; font-weight: 800; color: var(--primary); white-space: nowrap; animation: subIn 0.3s ease backwards; }
        @keyframes subIn { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
        .sub-item.active { background: var(--text-main); color: white; }

        .amt-input { width: 100%; border: none; font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: var(--primary); text-align: center; background: transparent; outline: none; margin: 5px 0; }
        .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .pay-btn { background: #F8FAFC; border: 1px solid var(--border); border-radius: 14px; padding: 12px 2px; font-weight: 800; font-size: 11px; text-align: center; }
        .pay-btn.active { background: var(--text-main); color: white; }

        .submit-btn { width: 100%; padding: 18px; border-radius: 20px; background: var(--primary); color: white; font-weight: 900; border: none; margin-top: 18px; box-shadow: 0 8px 20px rgba(99,102,241,0.25); }
        .submit-btn:active { transform: scale(0.97); }

        /* V55 存錢卡片優化樣式 */
        .save-card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .save-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .save-title { font-weight: 900; font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .save-percent { font-family: 'Montserrat'; font-size: 11px; font-weight: 900; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 8px; }
        .save-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .save-amount { font-size: 11px; color: var(--text-sub); font-weight: 700; }
        .save-amount b { color: var(--text-main); font-family: 'Montserrat'; font-size: 14px; }

        /* 明細樣式 */
        .history-item { background: var(--surface); margin-bottom: 10px; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 7px; font-weight: 900; margin-right: 6px; }
        .tag-expense { background: #FFE4E6; color: var(--danger); }
        .tag-repay { background: #D1FAE5; color: var(--success); }
        .tag-save { background: #E0E7FF; color: var(--primary); }

        /* 彈窗 */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: white; padding: 30px; border-radius: 32px; z-index: 3000; width: 90%; max-width: 380px; display: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal.active { display: block; transform: translate(-50%, -50%) scale(1); }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2500; display: none; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 1000; }
        .tab { font-size: 12px; font-weight: 900; color: var(--text-sub); text-align: center; }
        .tab.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-weight:900; font-size: 18px;">維恩計畫 <span style="color:var(--primary)">V55</span></div>
    <select id="monthPicker" class="month-selector" onchange="changeMonth()">
        <option value="4" selected>4月預算</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
</div>

<div class="container">
    <div id="mainPage" class="page active">
        <div class="status-card">
            <div id="daysLeft" style="font-size:11px; font-weight:800; color:var(--text-sub); margin-bottom:4px;"></div>
            <div id="totalAvailable" class="status-val">$0</div>
            <div style="display:flex; justify-content:space-between; margin-top:2px;">
                <small style="color:var(--text-sub); font-weight:700;">剩餘總預算</small>
                <div id="dailyAllowance" style="color:var(--success); font-weight:900; font-size:13px;"></div>
            </div>
        </div>

        <div class="section-header">📊 預算監控</div>
        <div id="budgetArea"></div>

        <div class="section-header">✍️ 快速記帳</div>
        <div class="quick-panel">
            <div class="cat-grid" id="catGrid">
                <div class="cat-item active" onclick="changeCat('food', this)">🍽️ 飲食</div>
                <div class="cat-item" onclick="changeCat('fun', this)">🎯 娛樂</div>
                <div class="cat-item" onclick="changeCat('taffi', this)">🐶 Taffi</div>
                <div class="cat-item" onclick="changeCat('fixed', this)">☁️ 訂閱</div>
            </div>
            <div class="sub-cat-grid" id="subCatGrid"></div>
            <input type="text" id="itemName" style="width:100%; border:none; font-size:15px; font-weight:800; text-align:center; outline:none; background:transparent;" placeholder="輸入內容...">
            <input type="number" id="itemAmt" class="amt-input" placeholder="0" pattern="\d*">
            <div class="pay-grid">
                <div class="pay-btn" onclick="setPay('cash', this)">💵 現金</div>
                <div class="pay-btn" onclick="setPay('cathay', this)">💳 國泰</div>
                <div class="pay-btn" onclick="setPay('taishin', this)">💳 台新</div>
                <div class="pay-btn" onclick="setPay('fubon', this)">💳 富邦</div>
            </div>
            <button class="submit-btn" onclick="submitExpense()">確認送出紀錄</button>
        </div>

        <div class="section-header">💳 信用卡還款</div>
        <div id="bankArea"></div>

        <div class="section-header">🏦 年度存錢累積 (成就解鎖)</div>
        <div id="saveArea"></div>
    </div>

    <div id="historyPage" class="page">
        <div class="section-header">📜 往來明細</div>
        <div id="historyList"></div>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()"></div>
<div id="actionModal" class="modal">
    <h3 id="modalTitle" style="margin:0; font-weight:900;">標題</h3>
    <p id="modalSub" style="font-size:12px; color:var(--text-sub); margin: 10px 0 20px;"></p>
    <input type="number" id="modalAmt" class="amt-input" style="border-bottom:2px solid var(--primary); margin-bottom:30px;" placeholder="0">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <button class="submit-btn" style="margin:0; background:#F1F5F9; color:var(--text-main); box-shadow:none;" onclick="closeModal()">取消</button>
        <button id="modalConfirmBtn" class="submit-btn" style="margin:0;">確認</button>
    </div>
</div>

<div class="bottom-bar">
    <div class="tab active" onclick="switchPage('main', this)">🏠 儀表板</div>
    <div class="tab" onclick="switchPage('history', this)">📝 明細紀錄</div>
</div>

<script>
    let currentMonth = "4";
    let currentCat = 'food';
    let currentPay = '';
    let activeAction = {};

    const subCategories = {
        food: ["早餐", "午餐", "晚餐", "外送", "零食", "其他"],
        fun: ["美甲", "健身", "購物", "羽球", "電影", "其他"],
        taffi: ["飼料", "美容", "醫療", "零食", "玩具", "其他"],
        fixed: ["電信費", "Gogoro", "iCloud", "其他"]
    };

    let db = JSON.parse(localStorage.getItem("taffi_v55")) || {
        months: {},
        banks: {
            cathay: { name: "國泰世華", bal: 0 },
            taishin: { name: "台新銀行", bal: 0 },
            fubon: { name: "富邦銀行", bal: 0 }
        },
        savings: [
            { name: "機車保養", target: 3000, bal: 0, type: "fixed" },
            { name: "年度保險", target: 12000, bal: 0, type: "fixed" },
            { name: "眉毛美容", target: 4500, bal: 0, type: "fixed" },
            { name: "旅遊基金", target: "無限存", bal: 0, type: "inf" },
            { name: "Taffi 備用金", target: "無限存", bal: 0, type: "inf" }
        ]
    };

    function initMonthData(m) {
        if(!db.months[m]) {
            db.months[m] = {
                budgets: {
                    fixed: { goal: 1300, spent: 0, icon: "☁️", name: "日常支出" },
                    taffi: { goal: 3000, spent: 0, icon: "🐶", name: "Taffi 預算" },
                    food: { goal: 9000, spent: 0, icon: "🍽️", name: "食物預算" },
                    fun: { goal: 5000, spent: 0, icon: "🎯", name: "娛樂預算" }
                },
                history: []
            };
        }
    }

    function render() {
        initMonthData(currentMonth);
        let mData = db.months[currentMonth];
        let totalRem = 0;
        
        // 渲染預算
        let bHtml = "";
        for(let k in mData.budgets) {
            let b = mData.budgets[k];
            let rem = b.goal - b.spent;
            totalRem += rem;
            let ratio = Math.min((b.spent / b.goal) * 100, 100);
            let color = ratio > 90 ? 'var(--danger)' : (ratio > 60 ? 'var(--warning)' : 'var(--primary)');
            bHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <b>${b.icon} ${b.name}</b>
                    <b style="font-family:Montserrat">$${rem.toLocaleString()}</b>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${ratio}%; background:${color}"></div></div>
                <small style="color:var(--text-sub)">預算 $${b.goal.toLocaleString()} / 已花 $${b.spent.toLocaleString()}</small>
            </div>`;
        }
        document.getElementById('budgetArea').innerHTML = bHtml;
        document.getElementById('totalAvailable').innerText = "$" + totalRem.toLocaleString();

        // 渲染存錢 (V55 優化版)
        let sHtml = "";
        db.savings.forEach((s, idx) => {
            let isFixed = s.type === 'fixed';
            let percent = isFixed ? Math.min(Math.round((s.bal / s.target) * 100), 100) : null;
            let percentTag = isFixed ? `<span class="save-percent">${percent}%</span>` : `<span class="save-percent" style="background:#FEF3C7; color:#D97706;">🔥 持續存</span>`;
            let barWidth = isFixed ? percent : (s.bal > 0 ? 100 : 0);

            sHtml += `<div class="save-card" onclick="openActionModal('save', ${idx})">
                <div class="save-info">
                    <div class="save-title">${isFixed?'📍':'✨'} ${s.name}</div>
                    ${percentTag}
                </div>
                <div class="progress-bg" style="height:6px; margin:0;"><div class="progress-fill" style="width:${barWidth}%; background:linear-gradient(90deg, #818CF8, var(--primary))"></div></div>
                <div class="save-footer">
                    <div class="save-amount">已存 <b>$${s.bal.toLocaleString()}</b> ${isFixed?' / 目標 $'+s.target.toLocaleString():''}</div>
                    <div style="font-size:10px; color:var(--primary); font-weight:900;">＋ 點擊存入</div>
                </div>
            </div>`;
        });
        document.getElementById('saveArea').innerHTML = sHtml;

        // 銀行與細項 (省略重複渲染邏輯以保持清爽，功能不變)
        let bankHtml = "";
        for(let k in db.banks) {
            let b = db.banks[k];
            bankHtml += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${b.name}</b><br><small style="color:var(--danger)">負債: $${b.bal.toLocaleString()}</small></div>
                <button style="padding:8px 16px; border-radius:10px; border:none; background:var(--text-main); color:white; font-weight:900;" onclick="openActionModal('repay', '${k}')">還款</button>
            </div>`;
        }
        document.getElementById('bankArea').innerHTML = bankHtml;

        renderSubCats();
        renderHistory();

        // 日期
        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), currentMonth, 0).getDate() - now.getDate() + 1;
        document.getElementById('daysLeft').innerText = `${currentMonth}月剩餘約 ${Math.max(1, daysLeft)} 天`;
        document.getElementById('dailyAllowance').innerText = `今日可花：$${Math.floor(totalRem/Math.max(1, daysLeft)).toLocaleString()}`;
    }

    function renderSubCats() {
        const grid = document.getElementById('subCatGrid');
        grid.innerHTML = "";
        subCategories[currentCat].forEach(sub => {
            const div = document.createElement('div');
            div.className = 'sub-item';
            div.innerText = sub;
            div.onclick = () => {
                document.getElementById('itemName').value = sub;
                document.querySelectorAll('.sub-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
            };
            grid.appendChild(div);
        });
    }

    function renderHistory() {
        let hHtml = "";
        db.months[currentMonth].history.forEach((h, idx) => {
            let tag = h.type==='repay'?'tag-repay':(h.type==='save'?'tag-save':'tag-expense');
            hHtml += `<div class="history-item">
                <div><span class="tag ${tag}">${h.type}</span><b>${h.name}</b><br><small>${h.time}</small></div>
                <div style="text-align:right;"><b style="font-family:Montserrat">${h.type==='expense'?'-':'+'}$${h.amt.toLocaleString()}</b><br><small style="color:var(--danger); cursor:pointer" onclick="deleteItem(${idx})">撤銷</small></div>
            </div>`;
        });
        document.getElementById('historyList').innerHTML = hHtml || "<p style='text-align:center; padding:40px; color:var(--text-sub)'>尚無明細</p>";
    }

    function changeCat(c, el) {
        currentCat = c;
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderSubCats();
    }

    function setPay(p, el) {
        currentPay = p;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function submitExpense() {
        let a = Number(document.getElementById('itemAmt').value);
        let n = document.getElementById('itemName').value;
        if(!a || !currentPay || !n) return alert("請填齊！");
        db.months[currentMonth].budgets[currentCat].spent += a;
        if(currentPay !== 'cash') db.banks[currentPay].bal += a;
        db.months[currentMonth].history.unshift({ type: 'expense', name: n, amt: a, cat: currentCat, pay: currentPay, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
        document.getElementById('itemAmt').value = "";
        saveAndRender();
    }

    function openActionModal(type, target) {
        activeAction = { type, target };
        const modal = document.getElementById('actionModal');
        document.getElementById('modalTitle').innerText = type==='repay'?'還款確認':'存款確認';
        document.getElementById('modalSub').innerText = "目標: " + (type==='repay'?db.banks[target].name:db.savings[target].name);
        modal.style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
        setTimeout(() => modal.classList.add('active'), 10);
        document.getElementById('modalConfirmBtn').onclick = confirmAction;
    }

    function confirmAction() {
        const amt = Number(document.getElementById('modalAmt').value);
        if(!amt) return;
        if(activeAction.type === 'repay') {
            db.banks[activeAction.target].bal -= amt;
            db.months[currentMonth].history.unshift({ type: 'repay', name: db.banks[activeAction.target].name+"還款", amt: amt, time: new Date().toLocaleTimeString() });
        } else {
            db.savings[activeAction.target].bal += amt;
            db.months[currentMonth].history.unshift({ type: 'save', name: db.savings[activeAction.target].name+"存款", amt: amt, time: new Date().toLocaleTimeString() });
        }
        document.getElementById('modalAmt').value = "";
        closeModal();
        saveAndRender();
    }

    function closeModal() {
        document.getElementById('actionModal').classList.remove('active');
        setTimeout(() => {
            document.getElementById('actionModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }, 300);
    }

    function deleteItem(idx) {
        if(!confirm("確定撤銷？")) return;
        let h = db.months[currentMonth].history[idx];
        if(h.type === 'expense') {
            db.months[currentMonth].budgets[h.cat].spent -= h.amt;
            if(h.pay !== 'cash') db.banks[h.pay].bal -= h.amt;
        } else if(h.type === 'repay') {
            for(let k in db.banks) if(h.name.includes(db.banks[k].name)) db.banks[k].bal += h.amt;
        } else {
            for(let s of db.savings) if(h.name.includes(s.name)) s.bal -= h.amt;
        }
        db.months[currentMonth].history.splice(idx, 1);
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem("taffi_v55", JSON.stringify(db)); render(); }
    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function changeMonth() { currentMonth = document.getElementById('monthPicker').value; render(); }

    render();
</script>
</body>
</html>
