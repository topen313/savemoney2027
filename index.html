<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>維恩計畫 V51 FRESH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #6366F1;
            --primary-light: #EEF2FF;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }

        /* 頂部導覽 */
        .top-nav {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); padding: 15px 20px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); }
        .month-selector {
            border: none; background: var(--primary-light); color: var(--primary);
            padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 14px;
        }

        /* 側邊選單 */
        #sideNav {
            position: fixed; left: -100%; top: 0; width: 280px; height: 100%;
            background: var(--surface); z-index: 2000; padding: 40px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sideNav.open { left: 0; }
        .nav-item {
            padding: 15px; margin-bottom: 8px; border-radius: 15px;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-sub);
        }
        .nav-item.active { background: var(--primary); color: white; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 核心狀態卡片 */
        .status-card {
            background: var(--surface); border-radius: 30px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .status-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--primary);
        }
        .status-val { font-family: 'Montserrat'; font-size: 36px; font-weight: 900; color: var(--primary); }
        .daily-tip { font-size: 13px; font-weight: 700; color: var(--success); background: #F0FDF4; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-top: 8px; }

        /* 預算區域 */
        .section-header { font-size: 13px; font-weight: 900; color: var(--text-sub); margin: 25px 0 12px 5px; letter-spacing: 1px; }
        .card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
        .progress-bg { height: 8px; background: #F1F5F9; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: 1s ease-out; }
        .sub-item-list { font-size: 11px; color: var(--text-sub); margin-top: 8px; padding-left: 5px; line-height: 1.6; }

        /* 快速記帳面板 */
        .quick-panel { background: #FFFFFF; border-radius: 32px; padding: 24px; border: 1px solid var(--primary); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.1); margin-bottom: 20px; }
        .cat-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .cat-item { 
            background: var(--bg); border-radius: 15px; padding: 10px 18px; white-space: nowrap;
            font-weight: 800; font-size: 13px; color: var(--text-sub); cursor: pointer; border: 1px solid var(--border);
        }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        .template-row { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .temp-btn { background: var(--primary-light); border: none; padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; color: var(--primary); cursor: pointer; }

        .amt-box { text-align: center; margin-bottom: 20px; }
        .amt-input { width: 100%; border: none; font-family: 'Montserrat'; font-size: 44px; font-weight: 900; color: var(--primary); text-align: center; background: transparent; outline: none; }
        
        .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .pay-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 5px; font-weight: 800; font-size: 11px; text-align: center; cursor: pointer; }
        .pay-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }

        .submit-btn { 
            width: 100%; padding: 18px; border-radius: 20px; background: var(--primary); color: white; 
            font-weight: 900; font-size: 17px; border: none; margin-top: 15px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }
        .submit-btn:active { transform: scale(0.96); }

        /* 銀行負債 */
        .bank-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #F1F5F9; margin-bottom: 5px; }
        .usage-bar { height: 4px; background: #F1F5F9; border-radius: 2px; width: 100%; margin-top: 5px; overflow: hidden; }

        /* 明細 */
        .history-item { 
            background: var(--surface); margin-bottom: 8px; padding: 16px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .del-tag { color: var(--danger); font-size: 11px; font-weight: 900; background: #FEF2F2; padding: 4px 8px; border-radius: 8px; cursor: pointer; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
    </style>
</head>
<body>

<div id="sideNav">
    <div style="margin-bottom:30px;"><h2 style="color:var(--primary); margin:0;">維恩計畫</h2><p style="color:var(--text-sub); font-size:12px;">V51 Fresh Clean</p></div>
    <div class="nav-item active" onclick="switchPage('main', this)">🏠 儀表板看板</div>
    <div class="nav-item" onclick="switchPage('history', this)">📝 消費明細紀錄</div>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<div class="top-nav">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div style="font-weight:900; color:var(--text-main); font-size:14px; letter-spacing:1px;">維恩記帳 V51</div>
    <select id="monthPicker" class="month-selector" onchange="changeMonth()">
        <option value="1">1月</option><option value="2">2月</option><option value="3" selected>3月</option>
        <option value="4">4月</option>
    </select>
</div>

<div class="container">
    <div id="mainPage" class="page active">
        <div class="status-card">
            <div id="daysLeft" style="font-size:13px; font-weight:800; color:var(--text-sub);">計算天數中...</div>
            <div style="margin: 10px 0;">
                <span id="totalAvailable" class="status-val">$0</span>
                <br><small style="color:var(--text-sub); font-weight:700;">本月可用餘額總計</small>
            </div>
            <div id="dailyAllowance" class="daily-tip">今日剩餘額度: $--</div>
        </div>

        <div class="section-header">📊 預算監控 (含細項)</div>
        <div id="budgetArea"></div>

        <div class="section-header">✍️ 快速記帳</div>
        <div class="quick-panel">
            <div class="cat-grid">
                <div class="cat-item active" onclick="changeCat('food', this)">🍽️ 食物</div>
                <div class="cat-item" onclick="changeCat('fun', this)">🎯 娛樂</div>
                <div class="cat-item" onclick="changeCat('taffi', this)">🐶 Taffi</div>
                <div class="cat-item" onclick="changeCat('fixed', this)">日常</div>
            </div>
            <div class="template-row">
                <button class="temp-btn" onclick="quickFill('早餐', 60)">🍳 早餐 60</button>
                <button class="temp-btn" onclick="quickFill('午餐', 120)">🍱 午餐 120</button>
                <button class="temp-btn" onclick="quickFill('手搖飲', 55)">🥤 手搖 55</button>
            </div>
            <div class="amt-box">
                <input type="text" id="itemName" style="width:100%; border:none; color:var(--text-main); font-size:15px; font-weight:700; text-align:center; outline:none; background:transparent;" placeholder="輸入內容...">
                <input type="number" id="itemAmt" class="amt-input" placeholder="0">
            </div>
            <div class="pay-grid">
                <div class="pay-btn" onclick="setPay('cash', this)">💵 現金</div>
                <div class="pay-btn" onclick="setPay('cathay', this)">💳 國泰</div>
                <div class="pay-btn" onclick="setPay('taishin', this)">💳 台新</div>
                <div class="pay-btn" onclick="setPay('fubon', this)">💳 富邦</div>
            </div>
            <button class="submit-btn" onclick="submitExpense()">確認紀錄</button>
        </div>

        <div class="section-header">💳 信用卡負債監控 (額度使用率)</div>
        <div id="bankArea"></div>

        <div class="section-header">🏦 存錢目標計畫</div>
        <div id="saveArea"></div>
    </div>

    <div id="historyPage" class="page">
        <div class="section-header">📜 消費明細紀錄 (點擊❌還原金額)</div>
        <div id="historyList"></div>
        <button class="submit-btn" style="background:var(--text-main)" onclick="switchPage('main')">返回儀表板</button>
    </div>
</div>

<script>
    let currentMonth = "3";
    let currentCat = 'food';
    let currentPay = '';

    // 銀行初始負債資料 (依妳要求加入)
    let db = JSON.parse(localStorage.getItem("taffi_v51")) || {
        months: {
            "3": { 
                budgets: { 
                    food: {goal:9000, spent:0, sub:"每月伙食開銷", icon:"🍽️", details:""}, 
                    fun: {goal:4000, spent:0, sub:"娛樂開銷", icon:"🎯", details:"美甲($1.4k)、羽球($500)、購物($2k)、健身($1080)"}, 
                    taffi: {goal:3000, spent:0, sub:"Taffi 專用", icon:"🐶", details:"飼料($1k)、美容($1k)、其他($1k)"}, 
                    fixed: {goal:1300, spent:0, sub:"固定日常支出", icon:"🏠", details:"電信($500)、Gogoro($499)、iCloud($300)"} 
                },
                history: []
            }
        },
        banks: {
            cathay: { name: "國泰世華", limit: 60000, bal: 56570, color: "#22C55E" },
            taishin: { name: "台新銀行", limit: 50000, bal: 22000, color: "#EF4444" },
            fubon: { name: "富邦銀行", limit: 50000, bal: 36773, color: "#F59E0B" }
        },
        savings: [
            { name: "眉毛美容", target: 4500, bal: 0, type: "fixed" },
            { name: "機車保養", target: 3000, bal: 0, type: "fixed" },
            { name: "年度保險", target: 12000, bal: 0, type: "fixed" },
            { name: "旅遊金", target: "無限存", bal: 0, type: "inf" },
            { name: "Taffi 存款", target: "無限存", bal: 0, type: "inf" }
        ]
    };

    function render() {
        let mData = db.months[currentMonth] || { budgets: {}, history: [] };
        let totalRem = 0;
        
        // 預算監控 (建議 1: 智能警報在此實現)
        let bHtml = "";
        for(let k in mData.budgets) {
            let b = mData.budgets[k];
            let rem = b.goal - b.spent;
            totalRem += rem;
            let ratio = (b.spent / b.goal) * 100;
            let fillColor = ratio >= 90 ? 'var(--danger)' : 'var(--primary)';
            
            bHtml += `<div class="card" style="${ratio >= 95 ? 'border: 1px solid var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><b style="font-size:15px;">${b.icon} ${k === 'food' ? '食物預算' : k === 'fun' ? '娛樂預算' : k === 'taffi' ? 'Taffi 預算' : '日常支出'}</b><br>
                    <span style="font-size:11px; color:var(--text-sub)">${b.sub}</span></div>
                    <div style="text-align:right;"><span style="font-family:'Montserrat'; font-weight:900; font-size:20px; color:var(--text-main);">$${rem.toLocaleString()}</span></div>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(ratio, 100)}%; background:${fillColor}"></div></div>
                <div class="sub-item-list">${b.details}</div>
            </div>`;
        }
        document.getElementById('budgetArea').innerHTML = bHtml;
        document.getElementById('totalAvailable').innerText = "$" + totalRem.toLocaleString();

        // 建議功能 3: 日均支出計算
        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = lastDay - now.getDate() + 1;
        const daily = Math.max(0, Math.floor(totalRem / daysLeft));
        document.getElementById('daysLeft').innerText = `本月剩餘 ${daysLeft - 1} 天`;
        document.getElementById('dailyAllowance').innerText = `今日平均額度: $${daily.toLocaleString()}`;

        // 銀行負債欄位 (含額度百分比)
        let bankHtml = "";
        for(let k in db.banks) {
            let b = db.banks[k];
            let rate = (b.bal / b.limit) * 100;
            bankHtml += `<div class="card" style="padding:15px;">
                <div class="bank-row">
                    <b style="color:var(--text-main)">${b.name}</b>
                    <span style="font-family:'Montserrat'; font-weight:900; color:${b.color}">$${b.bal.toLocaleString()}</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--text-sub); margin-top:5px;">
                    <span>額度 $${b.limit.toLocaleString()}</span><span>已使用 ${rate.toFixed(1)}%</span>
                </div>
                <div class="usage-bar"><div style="height:100%; width:${Math.min(rate, 100)}%; background:${b.color}"></div></div>
            </div>`;
        }
        document.getElementById('bankArea').innerHTML = bankHtml;

        // 存錢
        let sHtml = "";
        db.savings.forEach(s => {
            sHtml += `<div class="card" style="padding:15px; border-left: 5px solid ${s.type === 'fixed' ? 'var(--primary)' : 'var(--warning)'}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:14px;">${s.name}</b><br><small style="color:var(--text-sub)">${s.target === "無限存" ? "✨ 無限存" : "🎯 目標 $" + s.target.toLocaleString()}</small></div>
                    <span style="font-family:'Montserrat'; font-weight:900; font-size:18px; color:var(--primary)">$${s.bal.toLocaleString()}</span>
                </div>
            </div>`;
        });
        document.getElementById('saveArea').innerHTML = sHtml;

        // 明細
        let hHtml = "";
        mData.history.forEach((h, idx) => {
            hHtml += `<div class="history-item">
                <div><b>${h.name}</b><br><small style="color:var(--text-sub)">${h.time} | ${h.payName}</small></div>
                <div style="text-align:right;"><b style="color:var(--danger); font-family:'Montserrat';">-$${h.amt.toLocaleString()}</b><br><span class="del-tag" onclick="deleteItem(${idx})">❌ 刪除</span></div>
            </div>`;
        });
        document.getElementById('historyList').innerHTML = hHtml || "<p style='text-align:center; padding:30px; color:var(--text-sub)'>目前尚無紀錄</p>";
    }

    function quickFill(name, amt) {
        document.getElementById('itemName').value = name;
        document.getElementById('itemAmt').value = amt;
    }

    function deleteItem(idx) {
        if(!confirm("確定要還原這筆消費嗎？")) return;
        let item = db.months[currentMonth].history[idx];
        db.months[currentMonth].budgets[item.cat].spent -= item.amt;
        if(item.pay !== 'cash') db.banks[item.pay].bal -= item.amt;
        db.months[currentMonth].history.splice(idx, 1);
        saveAndRender();
    }

    function submitExpense() {
        let a = Number(document.getElementById('itemAmt').value);
        let n = document.getElementById('itemName').value || "日常支出";
        if(!a || !currentPay) return alert("請輸入金額並選擇支付管道");
        
        const payNames = {cash:'現金', cathay:'國泰', taishin:'台新', fubon:'富邦'};
        db.months[currentMonth].budgets[currentCat].spent += a;
        if(currentPay !== 'cash') db.banks[currentPay].bal += a;
        
        db.months[currentMonth].history.unshift({ 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            name: n, amt: a, cat: currentCat, pay: currentPay, payName: payNames[currentPay]
        });
        
        document.getElementById('itemAmt').value = ""; document.getElementById('itemName').value = "";
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem("taffi_v51", JSON.stringify(db)); render(); }
    function switchPage(p, el) { 
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        if(document.getElementById('sideNav').classList.contains('open')) toggleMenu();
    }
    function toggleMenu() { 
        document.getElementById('sideNav').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sideNav').classList.contains('open') ? 'block' : 'none';
    }
    function changeCat(c, el) { currentCat = c; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function setPay(p, el) { currentPay = p; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function changeMonth() { currentMonth = document.getElementById('monthPicker').value; render(); }

    render();
</script>
</body>
</html>
