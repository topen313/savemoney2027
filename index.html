<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taffi Finance V12 - Debt & Savings</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+TC:wght@400;700&display=swap');
:root {
  --primary: #6C63FF; --danger: #FF5E5E; --warning: #FFA000; --success: #27AE60;
  --bg: #F1F5F9; --card: #FFFFFF; --text: #1E293B; --border: #E2E8F0;
  --cathay: #00A650; --taishin: #DA2128; --fubon: #0067B1;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; max-width: 500px; margin: auto; padding-bottom: 80px; }

/* 🚀 負債歸零倒數計時 */
.debt-master-header { background: #0F172A; border-radius: 25px; padding: 25px; margin-bottom: 20px; color: white; text-align: center; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.3); }
.debt-title { font-size: 13px; opacity: 0.7; letter-spacing: 2px; margin-bottom: 10px; }
.debt-total { font-family: 'Montserrat'; font-size: 36px; font-weight: 800; color: #F8FAFC; }
.progress-container { background: #334155; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #F87171, #34D399); transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); width: 0%; }

/* 快速記帳：順序重排 */
.card { background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }
.section-title { font-weight: 700; font-size: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content:''; width:4px; height:16px; background:var(--primary); border-radius:2px; }

select, input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: #F8FAFC; margin-bottom: 12px; font-size: 15px; font-family: inherit; }
.btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; font-size: 16px; box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3); }

/* 信用卡卡片：增加「本月新增」 */
.bank-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 6px solid #ccc; position: relative; }
.bank-name { font-weight: 700; font-size: 15px; }
.bank-stats { display: flex; justify-content: space-between; margin-top: 10px; }
.stat-box { text-align: center; flex: 1; }
.stat-label { font-size: 10px; color: #94A3B8; display: block; }
.stat-val { font-family: 'Montserrat'; font-size: 15px; font-weight: 700; }
.new-charge { color: var(--danger); } /* 本月新增紅色 */

/* 存錢筒豐富化 */
.savings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.save-jar { background: white; border-radius: 20px; padding: 15px; border: 1px solid var(--border); position: relative; }
.save-jar.fixed { border-bottom: 4px solid var(--primary); }
.save-jar.infinite { border-bottom: 4px solid var(--warning); }
.jar-type { font-size: 9px; padding: 2px 6px; border-radius: 4px; position: absolute; top: 12px; right: 12px; }
.type-fixed { background: #EEF2FF; color: var(--primary); }
.type-infinite { background: #FFFBEB; color: var(--warning); }
</style>
</head>
<body>

<div class="debt-master-header">
    <div class="debt-title">🚀 總負債消滅進度</div>
    <div id="totalDebtDisplay" class="debt-total">$0</div>
    <div class="progress-container">
        <div id="debtProgressFill" class="progress-fill"></div>
    </div>
    <div style="font-size: 11px; opacity: 0.6;">目標歸零，重獲財務自由</div>
</div>

<div class="card">
    <div class="section-title">✍️ 快速記帳</div>
    
    <select id="itemCat">
        <option value="" disabled selected>請選擇支出類別</option>
        <option value="food">🍽️ 食物預算 (9k)</option>
        <option value="fun">🎯 娛樂支出 (5k)</option>
        <option value="taffi_pay">🐶 Taffi 支出 (2.5k)</option>
        <option value="fixed">🏠 固定支出 (1.3k)</option>
    </select>

    <input type="number" id="itemPrice" inputmode="decimal" placeholder="輸入金額 $0">

    <select id="itemPay">
        <option value="" disabled selected>請選擇支付管道</option>
        <option value="cash">💵 現金 / 金融卡</option>
        <option value="cathay">💳 國泰 (15日結)</option>
        <option value="taishin">💳 台新 (鎖卡中)</option>
        <option value="fubon">💳 富邦 (10日結)</option>
    </select>

    <button class="btn-add" onclick="addExpense()">確認送出紀錄</button>
</div>

<div class="section-title" style="margin-left: 10px;">💳 銀行帳單監控</div>
<div id="bankArea"></div>

<div class="section-title" style="margin-left: 10px;">🏦 存錢筒累計</div>
<div class="savings-grid" id="savingsArea"></div>

<script>
let db = JSON.parse(localStorage.getItem("taffi_finance_v12")) || {
    data: { expenses: [] },
    banks: {
        cathay: { name: "國泰世華", bal: 56570, limit: 60000, color: "var(--cathay)", monthlyAdd: 0 },
        taishin: { name: "台新(鎖)", bal: 22000, limit: 50000, color: "var(--taishin)", monthlyAdd: 0 },
        fubon: { name: "富邦銀行", bal: 36773, limit: 50000, color: "var(--fubon)", monthlyAdd: 0 }
    },
    savings: [
        { name: "機車保養", current: 0, target: 3000, type: "fixed" },
        { name: "年度保險", current: 0, target: 12000, type: "fixed" },
        { name: "眉毛美容", current: 0, target: 4500, type: "fixed" },
        { name: "Taffi 醫療", current: 0, type: "infinite" },
        { name: "旅遊基金", current: 0, type: "infinite" }
    ]
};

function save() { localStorage.setItem("taffi_finance_v12", JSON.stringify(db)); }

function addExpense() {
    let cat = document.getElementById("itemCat").value;
    let price = Number(document.getElementById("itemPrice").value);
    let pay = document.getElementById("itemPay").value;
    if(!cat || !price || !pay) { alert("請填寫完整資訊"); return; }

    db.data.expenses.push({ price, cat, pay, date: new Date().toISOString() });
    
    // 如果是信用卡，增加總欠款與「本月新增」
    if(pay !== 'cash') {
        db.banks[pay].bal += price;
        db.banks[pay].monthlyAdd += price;
    }
    
    save(); render();
    document.getElementById("itemPrice").value = "";
    document.getElementById("itemCat").selectedIndex = 0;
    document.getElementById("itemPay").selectedIndex = 0;
}

function updatePay(bankKey, amt) {
    if(!amt) return;
    db.banks[bankKey].bal -= Number(amt);
    save(); render();
}

function updateSaving(index, amt) {
    if(!amt) return;
    db.savings[index].current += Number(amt);
    save(); render();
}

function render() {
    // 1. 總負債與進度
    let totalDebt = 0; for(let k in db.banks) totalDebt += db.banks[k].bal;
    document.getElementById("totalDebtDisplay").innerText = `$${totalDebt.toLocaleString()}`;
    // 假設基準負債為 15 萬，計算消滅進度
    let progress = Math.max(0, 100 - (totalDebt / 150000 * 100));
    document.getElementById("debtProgressFill").style.width = progress + "%";

    // 2. 信用卡渲染
    let bankHtml = "";
    for(let k in db.banks) {
        let b = db.banks[k];
        bankHtml += `
        <div class="bank-card" style="border-left-color:${b.color}">
            <div class="bank-name">${b.name}</div>
            <div class="bank-stats">
                <div class="stat-box">
                    <span class="stat-label">總欠款</span>
                    <span class="stat-val">$${b.bal.toLocaleString()}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">本月新增刷卡</span>
                    <span class="stat-val new-charge">+$${b.monthlyAdd.toLocaleString()}</span>
                </div>
            </div>
            <input type="number" placeholder="還款金額" style="margin:12px 0 0; padding:8px; font-size:12px;" onchange="updatePay('${k}', this.value); this.value=''">
        </div>`;
    }
    document.getElementById("bankArea").innerHTML = bankHtml;

    // 3. 存錢筒渲染
    let saveHtml = "";
    db.savings.forEach((s, i) => {
        saveHtml += `
        <div class="save-jar ${s.type}">
            <span class="jar-type ${s.type === 'fixed' ? 'type-fixed' : 'type-infinite'}">${s.type === 'fixed' ? '固定存' : '無限存'}</span>
            <div style="font-size:13px; font-weight:700; margin-bottom:5px;">${s.name}</div>
            <div style="font-family:'Montserrat'; font-size:18px; font-weight:800; color:var(--primary);">$${s.current.toLocaleString()}</div>
            ${s.type === 'fixed' ? `<div style="font-size:10px; color:#94A3B8;">目標: $${s.target.toLocaleString()}</div>` : ''}
            <input type="number" placeholder="存入" style="margin:10px 0 0; padding:6px; font-size:11px;" onchange="updateSaving(${i}, this.value); this.value=''">
        </div>`;
    });
    document.getElementById("savingsArea").innerHTML = saveHtml;
}

render();
</script>
</body>
</html>
