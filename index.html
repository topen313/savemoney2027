<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taffi Ultra Finance - V6 Savings</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
  --primary: #6C63FF; --danger: #FF5E5E; --warning: #FFA000; --success: #27AE60;
  --bg: #F0F2F5; --card: #FFFFFF; --text: #333; --border: #E8EBF0;
  --cathay: #00A650; --taishin: #DA2128; --fubon: #0067B1;
  --saving-infinite: #A594F9;
}

body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; max-width: 500px; margin: auto; padding-bottom: 50px; }

/* 月份與頂部 */
.month-selector { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
.month-btn { padding: 8px 18px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: #888; cursor: pointer; white-space: nowrap; font-size: 14px; }
.month-btn.active { background: var(--primary); color: white; font-weight: 700; box-shadow: 0 4px 10px rgba(108, 99, 255, 0.2); border: none; }

.header-card { background: linear-gradient(135deg, #6C63FF 0%, #8E97FD 100%); border-radius: 25px; padding: 22px; margin-bottom: 20px; color: white; box-shadow: 0 8px 20px rgba(108,99,255,0.15); }
.total-val { font-family: 'Montserrat'; font-size: 32px; font-weight: 800; }

/* 信用卡卡片 */
.bank-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 6px solid #ccc; }
.bank-card.cathay { border-left-color: var(--cathay); }
.bank-card.taishin { border-left-color: var(--taishin); }
.bank-card.fubon { border-left-color: var(--fubon); }

/* 存錢筒專用樣式 */
.saving-group-title { font-size: 13px; color: #888; margin: 15px 0 8px 5px; font-weight: 700; }
.saving-item { background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
.progress-bg { height: 8px; background: #F0F2F7; border-radius: 10px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: var(--primary); transition: 0.5s; }
.infinite-fill { background: var(--saving-infinite); width: 100% !important; opacity: 0.6; } /* 無上限的條僅作裝飾 */

/* 表單與清單 */
.card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 18px; border: 1px solid var(--border); }
input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #FAFBFF; color: var(--text); margin-bottom: 10px; box-sizing: border-box; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 15px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
.btn-outline { background: none; border: 1px solid var(--border); color: #888; font-size: 11px; padding: 4px 8px; border-radius: 6px; }

.list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F5F5F5; font-size: 14px; }
</style>
</head>
<body>

<div class="month-selector" id="monthNav"></div>

<div class="header-card">
    <div style="font-size:12px; opacity:0.9;">💰 <span id="displayMonth"></span> 月剩餘總預算</div>
    <div id="monthlyRemain" class="total-val">$0</div>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
        <span style="font-weight:700;">✍️ 快速記帳</span>
        <button class="btn-outline" onclick="exportData()">💾 備份數據</button>
    </div>
    <input type="text" id="itemName" placeholder="項目 (例如: 午餐)">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <input type="number" id="itemPrice" placeholder="金額">
        <select id="itemCat">
            <option value="food">🍽️ 食物 (9k)</option>
            <option value="fun">🎯 娛樂 (5k)</option>
            <option value="taffi">🐶 Taffi (2.5k)</option>
            <option value="fixed">🏠 固定 (1.3k)</option>
        </select>
    </div>
    <select id="itemPay">
        <option value="cash">💵 現金</option>
        <option value="cathay">💳 國泰 (15日結)</option>
        <option value="taishin">💳 台新 (20日結)</option>
        <option value="fubon">💳 富邦 (10日結)</option>
    </select>
    <button class="btn" onclick="addExpense()">確認新增</button>
    <div id="historyList" style="margin-top:12px; max-height: 120px; overflow-y: auto;"></div>
</div>

<div style="font-weight:700; margin: 20px 0 10px; color:#666;">💳 信用卡負債監控</div>
<div id="bankArea"></div>

<div style="font-weight:700; margin: 20px 0 5px; color:#666;">🏦 存錢筒計劃</div>

<div class="saving-group-title">🎯 目標導向 (存滿為止)</div>
<div id="targetSavingsArea"></div>

<div class="saving-group-title">🌊 無上限累積 (長期儲備)</div>
<div id="infiniteSavingsArea"></div>

<script>
const months = [4, 5, 6, 7, 8, 9, 10, 11, 12];
let currentMonth = new Date().getMonth() + 1;
if(currentMonth < 4) currentMonth = 4;

// --- 初始化資料 (整合無上限存錢筒) ---
let db = JSON.parse(localStorage.getItem("taffi_finance_v6")) || {
    data: {},
    budgets: { food: 9000, fun: 5000, taffi: 2500, fixed: 1300 },
    banks: {
        cathay: { name: "國泰世華", bal: 56570, limit: 60000, due: 15, color: "var(--cathay)" },
        taishin: { name: "台新銀行", bal: 22000, limit: 50000, due: 20, color: "var(--taishin)" },
        fubon: { name: "富邦銀行", bal: 36773, limit: 50000, due: 10, color: "var(--fubon)" }
    },
    savings: [
        { name: "機車保養", target: 3000, current: 0, type: "target" },
        { name: "保險費", target: 12000, current: 0, type: "target" },
        { name: "眉毛美容", target: 4500, current: 0, type: "target" },
        { name: "Taffi 醫療金", target: 0, current: 0, type: "infinite" },
        { name: "旅遊金", target: 0, current: 0, type: "infinite" }
    ]
};

function save() { localStorage.setItem("taffi_finance_v6", JSON.stringify(db)); }

function switchMonth(m) { currentMonth = m; render(); }

function addExpense() {
    let name = document.getElementById("itemName").value || "未命名";
    let price = Number(document.getElementById("itemPrice").value);
    let cat = document.getElementById("itemCat").value;
    let pay = document.getElementById("itemPay").value;
    if(!price) return;
    if(!db.data[currentMonth]) db.data[currentMonth] = { expenses: [] };
    db.data[currentMonth].expenses.unshift({ name, price, cat, pay, date: new Date().toLocaleDateString() });
    if(pay !== 'cash') db.banks[pay].bal += price;
    save(); render();
    document.getElementById("itemName").value = "";
    document.getElementById("itemPrice").value = "";
}

function updatePay(bankKey, amt) {
    if(!amt) return;
    db.banks[bankKey].bal -= Number(amt);
    save(); render();
}

function updateSaving(index, amt) {
    if(!amt) return;
    db.savings[index].current += Number(amt);
    save(); render();
}

function render() {
    renderMonthNav();
    document.getElementById("displayMonth").innerText = currentMonth;
    let expenses = (db.data[currentMonth] && db.data[currentMonth].expenses) ? db.data[currentMonth].expenses : [];
    let sums = { food: 0, fun: 0, taffi: 0, fixed: 0 };
    expenses.forEach(e => sums[e.cat] += e.price);

    let totalRemain = (db.budgets.food - sums.food) + (db.budgets.fun - sums.fun);
    document.getElementById("monthlyRemain").innerText = `$${totalRemain.toLocaleString()}`;

    // 1. 銀行渲染
    let bankHtml = "";
    for(let k in db.banks) {
        let b = db.banks[k];
        let ratio = Math.min((b.bal / b.limit) * 100, 100);
        bankHtml += `<div class="bank-card ${k}">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span class="bank-name">${b.name} <small>(${b.due}日結)</small></span>
                <span style="font-weight:700; color:${b.color}">$${b.bal.toLocaleString()}</span>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width:${ratio}%; background:${b.color}"></div></div>
            <input type="number" placeholder="還款" style="width:70px; margin:0; padding:4px; font-size:11px;" onchange="updatePay('${k}', this.value); this.value=''">
        </div>`;
    }
    document.getElementById("bankArea").innerHTML = bankHtml;

    // 2. 存錢筒分區渲染
    let targetHtml = "";
    let infiniteHtml = "";
    db.savings.forEach((s, i) => {
        if(s.type === "target") {
            let p = Math.min((s.current / s.target) * 100, 100);
            targetHtml += `<div class="saving-item">
                <div style="display:flex; justify-content:space-between; font-size:13px;">
                    <span>${s.name} <small style="color:#999;">(目標 ${s.target})</small></span>
                    <b>$${s.current.toLocaleString()}</b>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${p}%"></div></div>
                <input type="number" placeholder="存入金額" style="width:100%; margin:0; padding:6px; font-size:12px;" onchange="updateSaving(${i}, this.value); this.value=''">
            </div>`;
        } else {
            infiniteHtml += `<div class="saving-item" style="border-left: 6px solid var(--saving-infinite);">
                <div style="display:flex; justify-content:space-between; font-size:13px;">
                    <span style="font-weight:700;">${s.name}</span>
                    <b style="color:var(--primary); font-size:16px;">$${s.current.toLocaleString()}</b>
                </div>
                <div class="progress-bg"><div class="progress-fill infinite-fill"></div></div>
                <input type="number" placeholder="存入金額" style="width:100%; margin:0; padding:6px; font-size:12px;" onchange="updateSaving(${i}, this.value); this.value=''">
            </div>`;
        }
    });
    document.getElementById("targetSavingsArea").innerHTML = targetHtml;
    document.getElementById("infiniteSavingsArea").innerHTML = infiniteHtml;

    // 3. 歷史清單
    let hist = "";
    expenses.forEach(e => {
        hist += `<div class="list-item">
            <span style="font-size:12px;">${e.name}</span>
            <span style="font-weight:700;">$${e.price.toLocaleString()}</span>
        </div>`;
    });
    document.getElementById("historyList").innerHTML = hist || '<div style="text-align:center; color:#CCC; font-size:11px; padding:10px;">尚無帳目</div>';
}

function renderMonthNav() {
    let html = "";
    months.forEach(m => {
        html += `<div class="month-btn ${m === currentMonth ? 'active' : ''}" onclick="switchMonth(${m})">${m}月</div>`;
    });
    document.getElementById("monthNav").innerHTML = html;
}

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
    const a = document.createElement('a');
    a.href = dataStr; a.download = "taffi_v6_backup.json"; a.click();
}

render();
</script>
</body>
</html>
