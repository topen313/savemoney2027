<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>維恩消費計畫 V28</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --primary: #6C63FF; --danger: #FF3B30; --warning: #FF9500; --success: #34C759;
  --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --border: #E2E8F0;
}

body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

/* 現代化側選單 */
#sideNav { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.1); border-right: 1px solid rgba(255,255,255,0.3); }
#sideNav.open { left: 0; }
.nav-header { padding: 40px 25px 20px; }
.nav-header h2 { font-weight: 900; color: var(--primary); margin: 0; font-size: 20px; letter-spacing: -0.5px; }
.nav-item { display: flex; align-items: center; margin: 8px 15px; padding: 15px 20px; color: #64748B; text-decoration: none; font-weight: 700; border-radius: 16px; transition: 0.3s; }
.nav-item.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(108, 99, 255, 0.2); }
.nav-item i { margin-right: 12px; font-size: 18px; }
.menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); display: none; z-index: 999; animation: fadeIn 0.3s; }

/* 頂部欄 */
.top-bar { display: flex; align-items: center; padding: 15px 20px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 900; }
.menu-icon { font-size: 22px; cursor: pointer; padding: 10px; border-radius: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-right: 15px; }

.main-content { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 100px; }
.section-title { font-size: 13px; font-weight: 900; color: #94A3B8; margin: 25px 0 12px 5px; letter-spacing: 1px; }

/* 頂部跑分區 */
#dailyStatus { background: #1E293B; color: white; border-radius: 26px; padding: 22px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 30px rgba(30, 41, 59, 0.2); }
.daily-val { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: #4ADE80; }

/* 預算與分類標籤 (維持功能但不更改視覺) */
.budget-card { background: white; padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 12px; }
.b-val { font-family: 'Montserrat'; font-size: 20px; font-weight: 900; color: var(--primary); }
.b-val.low-budget { color: var(--danger); }
.progress-container { height: 8px; background: #F1F5F9; border-radius: 10px; overflow: hidden; margin: 10px 0; }
.progress-bar { height: 100%; transition: 0.8s ease-out; }
.progress-bar.low-bg { background: var(--danger) !important; }

.quick-box { background: #E9EDF2; border-radius: 32px; padding: 20px; margin-bottom: 30px; border: 1px solid #D1D9E6; }
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.cat-btn { background: white; border-radius: 18px; padding: 12px 2px; text-align: center; cursor: pointer; border: 1px solid #CBD5E1; transition: 0.2s; }
.cat-btn.active { background: var(--primary); color: white; border-color: transparent; }

.history-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; min-height: 32px; }
.tag-btn { background: #F1F5F9; color: #64748B; font-size: 12px; padding: 6px 14px; border-radius: 14px; font-weight: 700; cursor: pointer; }

.item-amt { width: 100%; border: none; font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: var(--primary); outline: none; text-align: center; background: transparent; }
.submit-btn { width: 100%; padding: 20px; border-radius: 20px; background: var(--primary); color: white; font-weight: 900; font-size: 18px; border: none; margin-top: 15px; }

.save-fixed { border-left: 6px solid var(--danger); }
.save-infinite { border-left: 6px solid var(--warning); }
</style>
</head>
<body>

<div id="sideNav">
    <div class="nav-header">
        <h2>維恩消費計畫</h2>
        <p style="font-size: 11px; color: #94A3B8; font-weight: 700;">DIGITAL WALLET V28</p>
    </div>
    <a href="#" class="nav-item active">🏠 儀表板看板</a>
    <a href="#" class="nav-item">📈 消費趨勢圖</a>
    <a href="#" class="nav-item">⚙️ 預算再設定</a>
</div>
<div class="menu-overlay" onclick="toggleMenu()"></div>

<div class="top-bar">
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div id="monthDisplay" style="font-weight: 900; font-size: 18px;"></div>
</div>

<div class="main-content">
    <div id="dailyStatus">
        <div id="daysCount" style="font-size:13px; font-weight:700; opacity:0.8;"></div>
        <div style="text-align:right;">
            <small style="font-weight:800; font-size:11px; opacity:0.7;">今日可用</small><br>
            <span class="daily-val">$<span id="rollingNum">0</span></span>
        </div>
    </div>

    <div class="section-title">📊 預算監控</div>
    <div id="budgetArea"></div>

    <div class="section-title">✍️ 快速記帳</div>
    <div class="quick-box">
        <div class="cat-grid">
            <div class="cat-btn" id="btn_food" onclick="selectCat('food', this)">🍽️<span>食物</span></div>
            <div class="cat-btn" id="btn_fun" onclick="selectCat('fun', this)">🎯<span>娛樂</span></div>
            <div class="cat-btn" id="btn_taffi_pay" onclick="selectCat('taffi_pay', this)">🐶<span>Taffi</span></div>
            <div class="cat-btn" id="btn_fixed" onclick="selectCat('fixed', this)">🏠<span>日常</span></div>
        </div>
        <div style="background:white; border-radius:26px; padding:20px; border:1px solid #CBD5E1;">
            <div id="historyTags" class="history-tags"></div>
            <input type="text" id="itemName" style="width:100%; border:none; border-bottom:2px solid #F1F5F9; font-size:16px; font-weight:700; padding-bottom:10px; outline:none;" placeholder="內容">
            <input type="number" id="mainAmount" class="item-amt" inputmode="decimal" placeholder="$ 0">
        </div>
        <div class="cat-grid" style="grid-template-columns: repeat(2, 1fr); margin-top:15px;">
            <div class="cat-btn" id="pay_cash" onclick="selectPay('cash', this, '#64748B')">💵 現金</div>
            <div class="cat-btn" id="pay_cathay" onclick="selectPay('cathay', this, '#00A650')">💳 國泰</div>
        </div>
        <button class="submit-btn" onclick="submitExpense()">送出支出紀錄</button>
    </div>

    <div class="section-title">🏦 固定存 / ✨ 無限存</div>
    <div id="savingsArea"></div>
</div>

<script>
let selectedCat = ''; let selectedPay = '';
const now = new Date();
const currentMonthKey = `${now.getFullYear()}-${now.getMonth() + 1}`;

// 智能跨月結轉邏輯
let db = JSON.parse(localStorage.getItem("taffi_finance_v28")) || {
    lastMonth: "", 
    carryOver: 0, // 跨月餘額或負債
    budgets: { food: 9000, fun: 5000, taffi_pay: 3000, fixed: 1300 },
    expenses: [],
    catMemory: { food: {}, fun: {}, taffi_pay: {}, fixed: {} },
    savings: { fixed: [], infinite: [] }
};

// 檢查是否跨月
if (db.lastMonth && db.lastMonth !== currentMonthKey) {
    let totalBudget = Object.values(db.budgets).reduce((a, b) => a + b, 0);
    let totalSpent = db.expenses.reduce((sum, e) => sum + e.amt, 0);
    db.carryOver = (totalBudget - totalSpent); // 正數為剩餘，負數為負債
    db.expenses = []; // 清空上月明細
    db.lastMonth = currentMonthKey;
} else if (!db.lastMonth) {
    db.lastMonth = currentMonthKey;
}

function toggleMenu() {
    const nav = document.getElementById('sideNav');
    const overlay = document.querySelector('.menu-overlay');
    nav.classList.toggle('open');
    overlay.style.display = nav.classList.contains('open') ? 'block' : 'none';
}

function render(needAnim = true) {
    document.getElementById('monthDisplay').innerText = `${now.getMonth() + 1}月消費計畫`;
    
    let sums = { food: 0, fun: 0, taffi_pay: 0, fixed: 0 };
    db.expenses.forEach(e => sums[e.cat] += e.amt);

    let today = now.getDate();
    let daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - today + 1;
    let totalRem = Object.keys(db.budgets).reduce((sum, k) => sum + (db.budgets[k] - sums[k]), 0) + db.carryOver;
    let dailyAvail = Math.floor(totalRem / daysLeft);
    
    document.getElementById('daysCount').innerHTML = `本月剩 ${daysLeft} 天` + (db.carryOver !== 0 ? ` (含上月結轉 $${db.carryOver})` : "");
    if(needAnim) animateValue(document.getElementById('rollingNum'), 0, dailyAvail, 800);
    else document.getElementById('rollingNum').innerHTML = dailyAvail.toLocaleString();

    // 預算監控 (邏輯與截圖一致)
    const catNames = { food: "🍽️ 食物", fun: "🎯 娛樂", taffi_pay: "🐶 Taffi", fixed: "🏠 日常支出" };
    let bHtml = "";
    for(let k in db.budgets) {
        let spent = sums[k], rem = db.budgets[k] - spent;
        let isLow = (rem / db.budgets[k]) <= 0.3;
        bHtml += `<div class="budget-card">
            <div style="display:flex; justify-content:space-between;"><b>${catNames[k]}</b><span class="b-val ${isLow?'low-budget':''}">$${rem.toLocaleString()}</span></div>
            <div class="progress-container"><div class="progress-bar ${isLow?'low-bg':''}" style="width:${Math.min(100, (spent/db.budgets[k])*100)}%; background:var(--primary)"></div></div>
        </div>`;
    }
    document.getElementById("budgetArea").innerHTML = bHtml;
}

function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
}

// 其餘函數 selectCat, selectPay, submitExpense 維持 V27 邏輯
function selectCat(v, el) {
    selectedCat = v;
    document.querySelectorAll('.cat-btn').forEach(b => { if(!b.id.includes('pay')) b.classList.remove('active'); });
    el.classList.add('active');
    renderTags();
}

function renderTags() {
    let hHtml = "";
    if(selectedCat && db.catMemory[selectedCat]) {
        let common = Object.keys(db.catMemory[selectedCat]).filter(i => db.catMemory[selectedCat][i] >= 3).slice(0, 8);
        common.forEach(h => { hHtml += `<div class="tag-btn" onclick="document.getElementById('itemName').value='${h}'">${h}</div>`; });
    }
    document.getElementById("historyTags").innerHTML = hHtml;
}

function selectPay(v, el, color) {
    selectedPay = v;
    document.querySelectorAll('.cat-btn').forEach(b => { if(b.id.includes('pay')) { b.classList.remove('active'); b.style.backgroundColor=''; b.style.color=''; }});
    el.classList.add('active'); el.style.backgroundColor = color; el.style.color = 'white';
}

function submitExpense() {
    let name = document.getElementById('itemName').value.trim();
    let amt = Number(document.getElementById('mainAmount').value);
    if(!selectedCat || !amt || !selectedPay || !name) return alert("請填寫內容與金額");
    db.expenses.unshift({ id: Date.now(), name, amt, cat: selectedCat, pay: selectedPay });
    db.catMemory[selectedCat][name] = (db.catMemory[selectedCat][name] || 0) + 1;
    localStorage.setItem("taffi_finance_v28", JSON.stringify(db));
    render(false);
    document.getElementById('itemName').value = ''; document.getElementById('mainAmount').value = '';
}

render(true);
</script>
</body>
</html>
