<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>維恩計畫</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg: #F4F6F9;
            --surface: #FFFFFF;
            --primary: #7C73E6;
            --primary-light: #F3F2FF;
            --primary-grad: linear-gradient(135deg, #9A93EC 0%, #7C73E6 100%);
            --success: #10B981;
            --danger: #F43F5E;
            --warning: #F59E0B;
            --text-main: #1E293B;
            --text-sub: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03), 0 4px 12px -4px rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 140px; }

        .top-nav {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 24px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }
        .nav-title { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
        .nav-title span { color: var(--primary); }
        .month-selector { border: 1.5px solid var(--primary-light); background: var(--surface); color: var(--primary); padding: 8px 14px; border-radius: 14px; font-weight: 900; font-size: 14px; outline: none; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: pageIn 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .status-card {
            background: var(--primary-grad); border-radius: 32px; padding: 26px 28px;
            margin-bottom: 24px; box-shadow: 0 20px 35px -10px rgba(124, 115, 230, 0.35);
            position: relative; overflow: hidden; color: white;
            transition: transform 0.1s ease;
        }
        .status-val { font-family: 'Montserrat'; font-size: 46px; font-weight: 900; letter-spacing: -1px; margin: 6px 0; display: inline-block; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .card-mini-bar { height: 4px; background: rgba(255, 255, 255, 0.25); border-radius: 10px; margin: 10px 0 6px 0; overflow: hidden; }
        .card-mini-fill { height: 100%; background: #FFFFFF; width: 100%; transition: width 0.8s ease; }

        .card { 
            background: var(--surface); border-radius: 24px; padding: 22px; margin-bottom: 16px; 
            border: 1px solid rgba(255,255,255,0.7); transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        .section-header { font-size: 13px; font-weight: 900; color: var(--text-sub); margin: 32px 0 16px 8px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .progress-bg { height: 10px; background: #F1F5F9; border-radius: 20px; margin: 14px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 20px; width: 0; transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s; }
        
        .quick-panel { background: var(--surface); border-radius: 32px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
        .cat-item { background: #F8FAFC; border-radius: 18px; padding: 14px 4px; text-align: center; font-weight: 800; font-size: 12px; border: 1px solid var(--border); transition: 0.25s ease; }
        .cat-item.active { background: var(--primary-grad); color: white; border-color: transparent; transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(124, 115, 230, 0.25); }
        
        .sub-cat-grid { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding: 4px 0; }
        .sub-cat-grid::-webkit-scrollbar { display: none; }
        .sub-item { background: var(--primary-light); border-radius: 14px; padding: 10px 18px; font-size: 12px; font-weight: 800; color: var(--primary); white-space: nowrap; transition: 0.2s; }
        .sub-item.active { background: var(--text-main); color: white; }

        /* 輸入區改為上下排列，確保絕對不會被擠出螢幕之外 */
        .input-container { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 10px 0 18px; width: 100%; }
        .amt-input { width: 100%; border: none; font-family: 'Montserrat'; font-size: 44px; font-weight: 900; color: var(--primary); text-align: center; background: transparent; outline: none; padding: 0; }
        
        /* 放在金額下方的精緻一鍵送出大鈕 */
        .amt-submit-node { background: var(--primary-grad); color: white; border: none; width: 64px; height: 40px; border-radius: 20px; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 15px -3px rgba(124, 115, 230, 0.35); cursor: pointer; transition: transform 0.1s ease; }
        .amt-submit-node:active { transform: scale(0.92); }

        .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .pay-btn { background: #F8FAFC; border: 1px solid var(--border); border-radius: 16px; padding: 14px 2px; font-weight: 800; font-size: 11px; text-align: center; transition: 0.2s; }
        .pay-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }

        .repay-card { background: var(--surface); border-radius: 24px; padding: 20px 24px; margin-bottom: 14px; border: 1px solid var(--border); box-shadow: var(--shadow); -webkit-user-select: none; user-select: none; }
        .repay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .repay-btn-action { padding: 10px 20px; border-radius: 14px; border: none; background: var(--text-main); color: white; font-weight: 900; font-size: 13px; cursor: pointer; }

        .save-card { background: var(--surface); border-radius: 28px; padding: 22px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }
        .save-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; width: 100%; }
        .save-title { font-weight: 900; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .save-percent { font-family: 'Montserrat'; font-size: 11px; font-weight: 900; color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 10px; }
        .save-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; width: 100%; }

        .total-expense-card { background: var(--surface); border-radius: 24px; padding: 24px; margin-bottom: 16px; border: 1.5px solid var(--danger); box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
        
        .history-item { background: var(--surface); margin-bottom: 12px; padding: 16px 20px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .history-left { display: flex; align-items: center; gap: 14px; }
        .history-icon-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .history-circle-food { background: #FFF7ED; }
        .history-circle-fun { background: #EEF2FF; }
        .history-circle-taffi { background: #FEF2F4; }
        .history-circle-fixed { background: #F0FDF4; }
        .history-circle-other { background: #F8FAFC; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 900; margin-top: 4px; display: inline-block; }
        .tag-expense { background: #FFE4E6; color: var(--danger); }
        .tag-repay { background: #D1FAE5; color: var(--success); }
        .tag-save { background: #E0E7FF; color: var(--primary); }

        .backup-tool { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; padding-bottom: 30px; }
        .btn-tool { padding: 12px; border-radius: 14px; border: 1px dashed var(--text-sub); background: transparent; color: var(--text-sub); font-weight: 700; font-size: 12px; cursor: pointer; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 16px 12px 35px; border-top: 1px solid rgba(226, 232, 240, 0.5); z-index: 1000; }
        .tab { font-size: 12px; font-weight: 900; color: var(--text-sub); text-align: center; opacity: 0.5; transition: 0.2s; }
        .tab.active { color: var(--primary); opacity: 1; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: white; padding: 32px; border-radius: 40px; z-index: 3000; width: 92%; max-width: 400px; display: none; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15); transition: 0.4s; }
        .modal.active { display: block; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-title">維恩計畫 <span>Plan</span></div>
    <select id="monthPicker" class="month-selector" onchange="changeMonth()">
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
</div>

<div class="container">
    <div id="mainPage" class="page active">
        <div class="status-card" id="statusCard">
            <div id="daysLeft" style="font-size:12px; font-weight:700; opacity:0.9; margin-bottom:4px;"></div>
            <div id="dailyAllowance" class="status-val">$0</div>
            <div class="card-mini-bar"><div class="card-mini-fill" id="cardMiniFill"></div></div>
            <div style="display:flex; justify-content:space-between; align-items: center; margin-top:8px;">
                <small style="opacity:0.85; font-weight:700; font-size:11px;">本月剩餘預算</small>
                <div id="totalAvailable" style="background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:10px; font-weight:900; font-size:13px;">$0</div>
            </div>
        </div>

        <div class="section-header">📊 預算監控</div>
        <div id="budgetArea"></div>

        <div class="section-header">✍️ 快速記帳</div>
        <div class="quick-panel">
            <div class="cat-grid" id="catGrid">
                <div class="cat-item active" onclick="changeCat('food', this)">🍽️ 飲食</div>
                <div class="cat-item" onclick="changeCat('fun', this)">🎯 娛樂</div>
                <div class="cat-item" onclick="changeCat('taffi', this)">🐶 Taffi</div>
                <div class="cat-item" onclick="changeCat('fixed', this)">☁️ 訂閱</div>
            </div>
            <div class="sub-cat-grid" id="subCatGrid"></div>
            <input type="text" id="itemName" style="width:100%; border:none; font-size:15px; font-weight:800; text-align:center; outline:none; background:transparent; color:var(--text-main);" placeholder="輸入消費內容...">
            
            <div class="input-container">
                <input type="number" id="itemAmt" class="amt-input" placeholder="0" pattern="\d*">
                <button class="amt-submit-node" id="amtSubmitNode" onclick="submitExpense()">➔</button>
            </div>

            <div class="pay-grid">
                <div class="pay-btn" id="btn-cash" onclick="setPay('cash', this)">💵 現金</div>
                <div class="pay-btn" id="btn-cathay" onclick="setPay('cathay', this)">💳 國泰</div>
                <div class="pay-btn" id="btn-taishin" onclick="setPay('taishin', this)">💳 台新</div>
                <div class="pay-btn" id="btn-fubon" onclick="setPay('fubon', this)">💳 富邦</div>
            </div>
        </div>

        <div class="section-header">💳 信用卡還款 (長按卡片直接編輯負債)</div>
        <div id="bankArea"></div>

        <div class="section-header">🏦 年度存錢累積</div>
        <div id="saveArea"></div>
    </div>

    <div id="historyPage" class="page">
        <div class="section-header">💸 消費摘要</div>
        <div class="total-expense-card">
            <div>
                <b style="font-size:15px; color:var(--text-sub);">本月消費總支出</b><br>
                <small style="color:var(--text-sub); font-size:11px;">僅計算快速記帳之明細</small>
            </div>
            <b id="historyTotalAmt" style="font-family:Montserrat; font-size:28px; color:var(--danger)">$0</b>
        </div>
        <div class="section-header">📜 往來明細</div>
        <div id="historyList"></div>

        <div class="section-header">⚙️ 跨瀏覽器搬移工具</div>
        <div class="backup-tool">
            <button class="btn-tool" onclick="exportData()">📤 複製備份代碼</button>
            <button class="btn-tool" onclick="importData()">📥 貼上還原紀錄</button>
        </div>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); backdrop-filter:blur(8px); z-index:2500; display:none;"></div>
<div id="actionModal" class="modal">
    <h3 id="modalTitle" style="margin:0; font-weight:900;">標題</h3>
    <p id="modalSub" style="font-size:14px; color:var(--text-sub); margin: 12px 0 24px;"></p>
    <input type="number" id="modalAmt" class="amt-input" style="border-bottom:2px solid var(--primary); margin-bottom:35px;" placeholder="0">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
        <button style="margin:0; background:#F1F5F9; color:var(--text-main); box-shadow:none; border:none; padding:15px; border-radius:20px; font-weight:900;" onclick="closeModal()">取消</button>
        <button id="modalConfirmBtn" style="margin:0; background:var(--primary-grad); color:white; border:none; padding:15px; border-radius:20px; font-weight:900;">確認</button>
    </div>
</div>

<script>
    let currentMonth = String(new Date().getMonth() + 1);
    let currentCat = 'food';
    let currentPay = '';
    let activeAction = {};
    let longPressTimer = null;

    const subCategories = {
        food: ["早餐", "午餐", "晚餐", "外送", "零食", "其他"],
        fun: ["美甲", "健身", "購物", "羽球", "電影", "其他"],
        taffi: ["飼料", "美容", "醫療", "零食", "玩具", "其他"],
        fixed: ["電信費", "Gogoro", "iCloud", "其他"]
    };

    const initialBanks = {
        cathay: { name: "國泰世華", bal: 56570, limit: 100000 },
        taishin: { name: "台新銀行", bal: 22000, limit: 100000 },
        fubon: { name: "富邦銀行", bal: 36773, limit: 100000 }
    };

    let savedData = JSON.parse(localStorage.getItem("taffi_v55"));

    let db = savedData || {
        months: {},
        banks: initialBanks,
        savings: [
            { name: "機車保養", target: 3000, bal: 0, type: "fixed" },
            { name: "年度保險", target: 3000, bal: 0, type: "fixed" },
            { name: "眉毛美容", target: 4500, bal: 0, type: "fixed" },
            { name: "旅遊基金", target: 0, bal: 0, type: "inf" },
            { name: "Taffi 備用金", target: 0, bal: 0, type: "inf" }
        ]
    };

    function initMonthData(m) {
        if(!db.months[m]) {
            db.months[m] = {
                budgets: {
                    fixed: { goal: 1300, spent: 0, icon: "☁️", name: "訂閱支出", sub: "電信費$500、Gogoro$499、iCloud$300" },
                    taffi: { goal: 3000, spent: 0, icon: "🐶", name: "Taffi基本支出", sub: "飼料$1000、美容$1000、醫療$500、零食$500" },
                    food: { goal: 10000, spent: 0, icon: "🍽️", name: "飲食支出", sub: "早餐$1000、午餐$4000、晚餐$5000、其他$500" },
                    fun: { goal: 5000, spent: 0, icon: "🎯", name: "娛樂支出", sub: "美甲$1400、健身$1080、購物$1500、羽球$500" }
                },
                history: []
            };
        }
    }

    function getGradientColor(ratio) {
        if (ratio < 50) return '#7C73E6';
        if (ratio < 80) return '#F59E0B';
        return '#F43F5E';
    }

    function getBankProgressColor(ratio) {
        if (ratio < 40) return '#94A3B8';
        if (ratio < 80) return '#F59E0B';
        return '#F43F5E';
    }

    function render() {
        initMonthData(currentMonth);
        let mData = db.months[currentMonth];
        let totalRem = 0;
        let totalSpent = 0;
        let totalGoal = 0;
        
        let bHtml = "";
        for(let k in mData.budgets) {
            let b = mData.budgets[k];
            let rem = b.goal - b.spent;
            totalRem += rem;
            totalSpent += b.spent;
            totalGoal += b.goal;
            let ratio = Math.min((b.spent / b.goal) * 100, 100);
            let color = getGradientColor(ratio);
            let warningText = ratio >= 50 ? '<span style="color:#F43F5E; font-size:10px; font-weight:900; margin-left:6px; background:#FFE4E6; padding:2px 6px; border-radius:6px;">⚠️ 警告 50%</span>' : '';

            bHtml += `<div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <div>
                        <b style="font-size:16px;">${b.icon} ${b.name}</b>${warningText}<br>
                        <small style="color:var(--text-sub); font-size:11px; font-weight:700; line-height:1.6">${b.sub || ''}</small>
                    </div>
                    <b style="font-family:Montserrat; font-size:20px; color:var(--primary)">$${rem.toLocaleString()}</b>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${ratio}%; background:${color}"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-sub); font-weight:900; margin-top:4px;">
                    <span>已用 $${b.spent.toLocaleString()} / $${b.goal.toLocaleString()}</span>
                    <span style="color:${color}">${Math.round(ratio)}%</span>
                </div>
            </div>`;
        }
        document.getElementById('budgetArea').innerHTML = bHtml;
        document.getElementById('totalAvailable').innerText = "$" + totalRem.toLocaleString();

        let bankHtml = "";
        for(let k in db.banks) {
            let b = db.banks[k];
            let currentBal = b.bal || 0;
            let limit = b.limit || 100000;
            let ratio = Math.min((currentBal / limit) * 100, 100);
            let barColor = getBankProgressColor(ratio);
            
            bankHtml += `<div class="repay-card" 
                ontouchstart="startBankLongPress('${k}')" 
                ontouchend="endBankLongPress('${k}', event)">
                <div class="repay-header">
                    <div class="repay-info">
                        <b style="font-size:16px;">${b.name}</b>
                        <small style="color:var(--danger); font-family:Montserrat; font-weight:900;">負債: $${currentBal.toLocaleString()}</small>
                    </div>
                    <button class="repay-btn-action" ontouchstart="event.stopPropagation();" onclick="event.stopPropagation(); openActionModal('repay', '${k}')">還款</button>
                </div>
                <div class="progress-bg" style="height:6px; margin:0; border:none; background:#F1F5F9;"><div class="progress-fill" style="width:${ratio}%; background:${barColor}; opacity:0.8"></div></div>
            </div>`;
        }
        document.getElementById('bankArea').innerHTML = bankHtml;

        let sHtml = "";
        db.savings.forEach((s, idx) => {
            let isFixed = s.type === 'fixed';
            let percent = isFixed ? Math.min(Math.round((s.bal / s.target) * 100), 100) : null;
            let percentTag = isFixed ? `<span class="save-percent">${percent}%</span>` : `<span class="save-percent" style="background:#FEF3C7; color:#D97706;">持續存</span>`;
            let barWidth = isFixed ? percent : (s.bal > 0 ? 100 : 0);
            sHtml += `<div class="save-card" onclick="openActionModal('save', ${idx})">
                <div class="save-info">
                    <div class="save-title">${isFixed?'📍':'✨'} ${s.name}</div>
                    ${percentTag}
                </div>
                <div class="progress-bg" style="height:8px; margin:0; border:none;"><div class="progress-fill" style="width:${barWidth}%; background:var(--primary-grad)"></div></div>
                <div class="save-footer">
                    <div style="font-size:12px; color:var(--text-sub); font-weight:700;">已存 <b style="color:var(--text-main); font-family:Montserrat; font-size:15px;">$${s.bal.toLocaleString()}</b> ${isFixed?' / $'+s.target.toLocaleString():''}</div>
                    <div style="font-size:11px; color:var(--primary); font-weight:900;">存入 ＋</div>
                </div>
            </div>`;
        });
        document.getElementById('saveArea').innerHTML = sHtml;

        renderSubCats();
        renderHistory();

        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), currentMonth, 0).getDate() - now.getDate() + 1;
        const finalDays = Math.max(1, daysLeft);
        
        document.getElementById('daysLeft').innerHTML = `今天可花 💰 <span style="float:right; font-weight:500; font-size:11px; background:rgba(255,255,255,0.18); padding:3px 8px; border-radius:8px;">本月已花 $${totalSpent.toLocaleString()} ｜ 剩餘 ${finalDays} 天</span>`;
        
        let dayAllowanceVal = Math.floor(totalRem / finalDays);
        document.getElementById('dailyAllowance').innerText = `$${dayAllowanceVal.toLocaleString()}`;

        let dayRatio = totalGoal > 0 ? Math.min((totalRem / totalGoal) * 100, 100) : 100;
        document.getElementById('cardMiniFill').style.width = `${dayRatio}%`;
    }

    function renderSubCats() {
        const grid = document.getElementById('subCatGrid');
        grid.innerHTML = "";
        subCategories[currentCat].forEach(sub => {
            const div = document.createElement('div');
            div.className = 'sub-item' + (document.getElementById('itemName').value === sub ? ' active' : '');
            div.innerText = sub;
            div.onclick = () => { 
                document.getElementById('itemName').value = sub; 
                renderSubCats(); 
                document.getElementById('itemAmt').focus(); 
            };
            grid.appendChild(div);
        });
    }

    function renderHistory() {
        let hHtml = "";
        let totalExpenseAmt = 0;
        db.months[currentMonth].history.forEach((h, idx) => {
            let tagMap = { 'expense': '支出', 'repay': '還款', 'save': '存錢' };
            let tagClass = h.type==='repay'?'tag-repay':(h.type==='save'?'tag-save':'tag-expense');
            
            let iconStr = "📝";
            let circleClass = "history-circle-other";
            if(h.type === 'expense') {
                totalExpenseAmt += h.amt;
                if(h.cat === 'food') { iconStr = "🍽️"; circleClass = "history-circle-food"; }
                else if(h.cat === 'fun') { iconStr = "🎯"; circleClass = "history-circle-fun"; }
                else if(h.cat === 'taffi') { iconStr = "🐶"; circleClass = "history-circle-taffi"; }
                else if(h.cat === 'fixed') { iconStr = "☁️"; circleClass = "history-circle-fixed"; }
            } else if(h.type === 'repay') { iconStr = "💳"; } 
            else if(h.type === 'save') { iconStr = "🏦"; }

            hHtml += `<div class="history-item">
                <div class="history-left">
                    <div class="history-icon-circle ${circleClass}">${iconStr}</div>
                    <div>
                        <b style="font-size:15px; color:var(--text-main);">${h.name}</b><br>
                        <span class="tag ${tagClass}">${tagMap[h.type]}</span>
                        <small style="color:var(--text-sub); font-weight:700; margin-left: 6px; font-size:11px;">${h.time}</small>
                    </div>
                </div>
                <div style="text-align:right;">
                    <b style="font-family:Montserrat; font-size:16px; color:var(--text-main);">${h.type==='expense'?'-':'+'}$${h.amt.toLocaleString()}</b><br>
                    <small style="color:var(--danger); cursor:pointer; font-weight:900; font-size:10px; opacity: 0.7;" onclick="deleteItem(${idx})">撤銷</small>
                </div>
            </div>`;
        });
        document.getElementById('historyList').innerHTML = hHtml || "<div style='text-align:center; padding:60px 0; color:var(--text-sub); font-weight:700;'>尚無紀錄</div>";
        document.getElementById('historyTotalAmt').innerText = "$" + totalExpenseAmt.toLocaleString();
    }

    function changeCat(c, el) {
        currentCat = c;
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderSubCats();
    }

    function setPay(p, el) {
        currentPay = p;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function submitExpense() {
        let a = Number(document.getElementById('itemAmt').value);
        let n = document.getElementById('itemName').value;
        if(!a || !currentPay || !n) return alert("消費內容、金額、支付工具都要選好喔！");
        db.months[currentMonth].budgets[currentCat].spent += a;
        if(currentPay !== 'cash') db.banks[currentPay].bal += a;
        db.months[currentMonth].history.unshift({ type: 'expense', name: n, amt: a, cat: currentCat, pay: currentPay, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
        document.getElementById('itemAmt').value = "";
        
        const card = document.getElementById('statusCard');
        card.style.transform = "scale(0.96)";
        setTimeout(() => { card.style.transform = "scale(1)"; }, 100);

        saveAndRender();
    }

    function openActionModal(type, target) {
        activeAction = { type, target };
        const modal = document.getElementById('actionModal');
        document.getElementById('modalTitle').innerText = type==='repay'?'還款確認':'存錢確認';
        document.getElementById('modalSub').innerText = "目標: " + (type==='repay'?db.banks[target].name:db.savings[target].name);
        modal.style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function confirmAction() {
        const amt = Number(document.getElementById('modalAmt').value);
        if(!amt) return;
        if(activeAction.type === 'repay') {
            db.banks[activeAction.target].bal -= amt;
            db.months[currentMonth].history.unshift({ type: 'repay', name: db.banks[activeAction.target].name+"還款", amt: amt, time: new Date().toLocaleTimeString() });
        } else {
            db.savings[activeAction.target].bal += amt;
            db.months[currentMonth].history.unshift({ type: 'save', name: db.savings[activeAction.target].name+"存款", amt: amt, time: new Date().toLocaleTimeString() });
        }
        document.getElementById('modalAmt').value = "";
        closeModal();
        saveAndRender();
    }

    function closeModal() {
        document.getElementById('actionModal').classList.remove('active');
        setTimeout(() => { document.getElementById('actionModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }, 300);
    }

    function deleteItem(idx) {
        if(!confirm("確定要撤銷嗎？")) return;
        let h = db.months[currentMonth].history[idx];
        if(h.type === 'expense') {
            db.months[currentMonth].budgets[h.cat].spent -= h.amt;
            if(h.pay !== 'cash') db.banks[h.pay].bal -= h.amt;
        } else if(h.type === 'repay') {
            for(let k in db.banks) if(h.name.includes(db.banks[k].name)) db.banks[k].bal += h.amt;
        } else {
            for(let s of db.savings) if(h.name.includes(s.name)) s.bal -= h.amt;
        }
        db.months[currentMonth].history.splice(idx, 1);
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem("taffi_v55", JSON.stringify(db)); render(); }
    
    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    
    function changeMonth() { currentMonth = document.getElementById('monthPicker').value; render(); }

    function exportData() {
        const dataStr = localStorage.getItem("taffi_v55");
        const el = document.createElement('textarea');
        el.value = dataStr;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("備份代碼已複製！請去 Safari 開啟網頁後點擊「貼上還原紀錄」。");
    }

    function importData() {
        const input = prompt("請貼上剛才複製的備份代碼：");
        if(input) {
            try {
                JSON.parse(input);
                localStorage.setItem("taffi_v55", input);
                location.reload();
            } catch(e) {
                alert("代碼格式不正確，請重新複製一次。");
            }
        }
    }

    function editBankBalance(bankKey) {
        const bank = db.banks[bankKey];
        const newBal = prompt(`${bank.name} 目前負債金額：`, bank.bal);
        if (newBal === null) return;
        const amt = Number(newBal);
        if (isNaN(amt)) {
            alert("請輸入有效的數字");
            return;
        }
        db.banks[bankKey].bal = amt;
        saveAndRender();
    }

    function startBankLongPress(bankKey) {
        window.isLongPressTriggered = false;
        longPressTimer = setTimeout(() => {
            window.isLongPressTriggered = true;
            editBankBalance(bankKey);
        }, 600);
    }

    function endBankLongPress(bankKey, event) {
        clearTimeout(longPressTimer);
        if (window.isLongPressTriggered) {
            event.preventDefault();
        }
    }

    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const amt = urlParams.get('amt');
        const pay = urlParams.get('pay'); 
        const name = urlParams.get('name'); 
        
        if (name) {
            document.getElementById('itemName').value = name;
        } else {
            document.getElementById('itemName').value = "捷徑記帳"; 
        }

        if (amt) {
            document.getElementById('itemAmt').value = amt;
        }
        
        if (pay) {
            const payBtn = document.getElementById(`btn-${pay}`);
            if (payBtn) {
                setPay(pay, payBtn);
            }
        }

        if (amt) {
            document.getElementById('itemAmt').focus();
        }
    });

    document.getElementById('itemAmt').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            submitExpense();
        }
    });
    document.getElementById('itemName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            document.getElementById('itemAmt').focus();
        }
    });

    document.getElementById('monthPicker').value = currentMonth;
    document.getElementById('modalConfirmBtn').onclick = confirmAction;
    render();
</script>

<div class="bottom-bar">
    <div class="tab active" onclick="switchPage('main', this)">🏠 儀表板</div>
    <div class="tab" onclick="switchPage('history', this)">📝 明細紀錄</div>
</div>

</body>
</html>
