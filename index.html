<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taffi 財務中心</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background: #f2f4f8;
  margin: 0;
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 15px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.05);
}

label {
  font-size: 0.85rem;
  color: #666;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 1rem;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4a90e2, #357abd);
  border: none;
  color: white;
  font-size: 1rem;
  border-radius: 12px;
}

.result {
  display: none;
}

.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-top: 5px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: linear-gradient(90deg, #4a90e2, #6fc3ff);
}

.row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.green { color: #2e7d32; font-weight: bold; }
.red { color: #d32f2f; font-weight: bold; }

</style>
</head>

<body>

<h1>💰 Taffi 財務中心</h1>

<div class="card">
<h3>📊 本月能力</h3>

<label>收入</label>
<input id="income" type="number" value="37000" oninput="calcAbility()">

<div class="row">
<span>可還債金額</span>
<span id="ability" class="green">0</span>
</div>

</div>

<div class="card">
<h3>📉 月底輸入</h3>

<label>🐶 Taffi（3000）</label>
<input id="dog">

<div class="progress"><div id="barDog" class="bar"></div></div>

<label>🍱 食物（9000）</label>
<input id="food">

<div class="progress"><div id="barFood" class="bar"></div></div>

<label>🎯 娛樂（5000）</label>
<input id="fun">

<div class="progress"><div id="barFun" class="bar"></div></div>

<button onclick="calc()">計算</button>

</div>

<div id="result" class="card result">
<h3>🎉 本月結果</h3>

<div class="row">
<span>🐶 Taffi存入</span>
<span id="taffi" class="green"></span>
</div>

<div class="row">
<span>💰 緊急金</span>
<span id="emg" class="green"></span>
</div>

<div class="row">
<span>⚠️ 超支</span>
<span id="over" class="red"></span>
</div>

<hr>

<div class="row" style="font-size:1.2rem;">
<span>總結餘</span>
<span id="total"></span>
</div>

</div>

<script>

function calcAbility(){
let income = Number(document.getElementById("income").value)||0;
let fixed = 1300 + 3000 + 9000 + 5000;
document.getElementById("ability").innerText = income - fixed;
}

function updateBar(id, spent, budget){
let percent = Math.min((spent / budget)*100,100);
document.getElementById(id).style.width = percent + "%";
}

function calc(){

let dog = Number(document.getElementById("dog").value)||0;
let food = Number(document.getElementById("food").value)||0;
let fun = Number(document.getElementById("fun").value)||0;

let bDog=3000, bFood=9000, bFun=5000;

updateBar("barDog", dog, bDog);
updateBar("barFood", food, bFood);
updateBar("barFun", fun, bFun);

let leftDog=bDog-dog;
let leftFood=bFood-food;
let leftFun=bFun-fun;

let toTaffi = leftDog>0?leftDog:0;
let toEmergency = (leftFood>0?leftFood:0)+(leftFun>0?leftFun:0);

let over = 0;
if(leftDog<0) over+=leftDog;
if(leftFood<0) over+=leftFood;
if(leftFun<0) over+=leftFun;

document.getElementById("taffi").innerText = toTaffi;
document.getElementById("emg").innerText = toEmergency;
document.getElementById("over").innerText = over;
document.getElementById("total").innerText = toTaffi+toEmergency;

document.getElementById("result").style.display="block";
}

calcAbility();

</script>

</body>
</html>
