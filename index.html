<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taffi 財務中心</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f6f8;
  margin: 0;
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

/* 標題 */
.header {
  background: #dbe7f3;
  padding: 12px;
  border-radius: 16px;
  text-align: center;
  font-weight: bold;
  color: #3b6ea8;
  margin-bottom: 15px;
}

/* 卡片 */
.card {
  background: white;
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 15px;
}

/* 勾選區 */
.item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px dashed #eee;
}

.item:last-child { border-bottom: none; }

.amount {
  color: #555;
  font-weight: bold;
}

/* Step */
.step {
  color: #4a90e2;
  font-weight: bold;
  margin-bottom: 10px;
}

/* 彩色卡 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.box {
  border-radius: 16px;
  padding: 12px;
  text-align: center;
}

.box input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #fff;
  margin-top: 10px;
  text-align: center;
  font-size: 1rem;
}

/* 顏色 */
.pink { background: #f7e6eb; border: 2px solid #f3c6d2; }
.yellow { background: #f8f1dc; border: 2px solid #f2d58a; }
.purple { background: #efe5f5; border: 2px solid #d7bce8; }
.blue { background: #e4eef7; border: 2px solid #bcd3ea; }

.budget {
  font-size: 0.8rem;
  color: #777;
  margin-top: 6px;
}

/* 按鈕 */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #4a90e2;
  color: white;
  font-size: 1rem;
  margin-top: 15px;
}

/* 結果 */
.result {
  display: none;
  background: #e8f5e9;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.green { color: #2e7d32; font-weight: bold; }
.red { color: #d32f2f; font-weight: bold; }

</style>
</head>

<body>

<div class="header">
總收入：<span id="incomeText">37000</span>
</div>

<div class="card">
<div class="step">固定支出確認</div>

<div class="item">
<span>📱 固定帳單</span>
<span class="amount">$1,300</span>
</div>

<div class="item">
<span>🐶 Taffi</span>
<span class="amount">$3,000</span>
</div>

<div class="item">
<span>🍱 食物</span>
<span class="amount">$9,000</span>
</div>

<div class="item">
<span>🎯 娛樂</span>
<span class="amount">$5,000</span>
</div>

</div>

<div class="card">

<div class="step">Step 2：月結算</div>

<div class="grid">

<div class="box pink">
🐶<br>狗狗支出
<input id="dog">
<div class="budget">預算 3000</div>
</div>

<div class="box yellow">
🍱<br>餐飲
<input id="food">
<div class="budget">預算 9000</div>
</div>

<div class="box purple">
🛍️<br>購物
<input id="shop">
<div class="budget">預算 2000</div>
</div>

<div class="box blue">
🎬<br>娛樂
<input id="fun">
<div class="budget">預算 3000</div>
</div>

</div>

<button onclick="calc()">計算</button>

</div>

<div id="result" class="card result">

<div class="row">
<span>🐶 存入Taffi</span>
<span id="taffi" class="green"></span>
</div>

<div class="row">
<span>💰 緊急金</span>
<span id="emg" class="green"></span>
</div>

<div class="row">
<span>⚠️ 超支</span>
<span id="over" class="red"></span>
</div>

<hr>

<div class="row">
<span>總結餘</span>
<span id="total"></span>
</div>

</div>

<script>

function calc(){

let dog = Number(document.getElementById("dog").value)||0;
let food = Number(document.getElementById("food").value)||0;
let shop = Number(document.getElementById("shop").value)||0;
let fun = Number(document.getElementById("fun").value)||0;

let bDog=3000, bFood=9000, bShop=2000, bFun=3000;

let leftDog=bDog-dog;
let leftFood=bFood-food;
let leftShop=bShop-shop;
let leftFun=bFun-fun;

let taffi = leftDog>0?leftDog:0;
let emg = (leftFood>0?leftFood:0)+(leftShop>0?leftShop:0)+(leftFun>0?leftFun:0);

let over=0;
if(leftDog<0) over+=leftDog;
if(leftFood<0) over+=leftFood;
if(leftShop<0) over+=leftShop;
if(leftFun<0) over+=leftFun;

document.getElementById("taffi").innerText=taffi;
document.getElementById("emg").innerText=emg;
document.getElementById("over").innerText=over;
document.getElementById("total").innerText=taffi+emg;

document.getElementById("result").style.display="block";
}
