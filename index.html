<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>維恩消費計畫 V29</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --primary: #6C63FF; --danger: #FF3B30; --warning: #FF9500; --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --border: #E2E8F0;
}

body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

/* 現代化側選單修正 */
#sideNav { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
#sideNav.open { left: 0; }
.nav-item { display: flex; align-items: center; margin: 8px 15px; padding: 16px 20px; color: #64748B; text-decoration: none; font-weight: 700; border-radius: 16px; transition: 0.3s; }
.nav-item.active { background: var(--primary); color: white; }

/* 月份滑動列 */
.month-scroller { display: flex; gap: 15px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; background: white; border-bottom: 1px solid var(--border); }
.month-scroller::-webkit-scrollbar { display: none; }
.month-tab { padding: 8px 20px; border-radius: 20px; background: #F1F5F9; color: #94A3B8; font-weight: 800; font-size: 14px; white-space: nowrap; cursor: pointer; transition: 0.3s; }
.month-tab.active { background: var(--primary); color: white; transform: scale(1.05); }

/* 頂部欄 */
.top-bar { display: flex; align-items: center; padding: 15px 20px; background: white; position: sticky; top: 0; z-index: 900; }
.menu-icon { font-size: 22px; cursor: pointer; padding: 10px; border-radius: 12px; background: #F1F5F9; margin-right: 15px; }

.main-content { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 100px; }
.section-title { font-size: 13px; font-weight: 900; color: #94A3B8; margin: 25px 0 12px 5px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }

/* 深色狀態卡片 */
#dailyStatus { background: #1E293B; color: white; border-radius: 26px; padding: 22px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 30px rgba(30, 41, 59, 0.2); }
.status-left { font-size: 13px; font-weight: 700; opacity: 0.9; }
.daily-val { font-family: 'Montserrat'; font-size: 34px; font-weight: 900; color: #4ADE80; }

/* 快速記帳修正區 (針對圖九) */
.quick-box { background: #E9EDF2; border-radius: 32px; padding: 20px; margin-bottom: 30px; border: 1px solid #D1D9E6; }
.input-card { background: white; border-radius: 26px; padding: 25px 20px; border: 1px solid #CBD5E1; margin: 15px 0; text-align: center; }
.history-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; min-height: 32px; }
.tag-btn { background: #F1F5F9; color: #64748B; font-size: 12px; padding: 7px 15px; border-radius: 14px; font-weight: 700; cursor: pointer; }

.item-text { width: 100%; border: none; border-bottom: 2px solid #F8FAFC; font-size: 18px; font-weight: 800; outline: none; margin-bottom: 10px; padding-bottom: 10px; text-align: center; color: var(--text); }
.item-amt { width: 100%; border: none; font-family: 'Montserrat'; font-size: 48px; font-weight: 900; color: var(--primary); outline: none; text-align: center; background: transparent; }

.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.cat-btn { background: white; border-radius: 18px; padding: 12px 2px; text-align: center; cursor: pointer; border: 1px solid #CBD5E1; transition: 0.2s; }
.cat-btn.active { background: var(--primary); color: white; border-color: transparent; }
.cat-btn span { display: block; font-size: 11px; font-weight: 800; margin-top: 4px; }

.submit-btn { width: 100%; padding: 22px; border-radius: 22px; background: var(--primary); color: white; font-weight: 900; font-size: 18px; border: none; margin-top: 20px; box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3); }

/* 預算監控 (針對圖十) */
.budget-card { background: white; padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 12px; }
.b-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.b-title { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.b-val { font-family: 'Montserrat'; font-size: 20px; font-weight: 900; color: var(--primary); }
.progress-container { height: 10px; background: #F1F5F9; border-radius: 10px; overflow: hidden; margin: 12px 0; }
.progress-bar { height: 100%; transition: 0.8s ease-out; background: var(--primary); }
</style>
</head>
<body>

<div id="sideNav">
    <div style="padding: 40px 25px 20px;">
        <h2 style="font-weight: 900; color: var(--primary); margin: 0;">維恩消費計畫</h2>
        <p style="font-size: 11px; color: #94A3B8; font-weight: 700;">PRO VERSION V29</p>
    </div>
    <a href="#" class="nav-item active">🏠 儀表板看板</a>
    <a href="#" class="nav-item">📈 消費趨勢圖</a>
    <a href="#" class="nav-item">⚙️ 預算再設定</a>
</div>

<div class="top-bar">
    <div class="menu-icon" onclick="document.getElementById('sideNav').classList.toggle('open')">☰</div>
    <div style="font-weight: 900; font-size: 18px;">消費計畫</div>
</div>

<div class="month-scroller">
    <div class="month-tab" onclick="changeMonth(1)">1月</div>
    <div class="month-tab" onclick="changeMonth(2)">2月</div>
    <div class="month-tab active" id="currentMonthTab">3月</div>
    <div class="month-tab" onclick="changeMonth(4)">4月</div>
    <div class="month-tab" onclick="changeMonth(5)">5月</div>
    <div class="month-tab" onclick="changeMonth(6)">6月</div>
</div>

<div class="main-content">
    <div id="dailyStatus">
        <div class="status-left">
            <div id="daysCount">本月剩 2 天</div>
            <div id="carryOverInfo" style="font-size: 10px; opacity: 0.7; margin-top: 4px;">含結轉: $0</div>
        </div>
        <div style="text-align:right;">
            <small style="font-weight:800; font-size:11px; opacity:0.7;">今日可用</small><br>
            <span class="daily-val">$<span id="rollingNum">9,150</span></span>
        </div>
    </div>

    <div class="section-title">📊 預算監控</div>
    <div id="budgetArea"></div>

    <div class="section-title">✍️ 快速記帳</div>
    <div class="quick-box">
        <div class="cat-grid">
            <div class="cat-btn" id="btn_food" onclick="selectCat('food', this)">🍽️<span>食物</span></div>
            <div class="cat-btn" id="btn_fun" onclick="selectCat('fun', this)">🎯<span>娛樂</span></div>
            <div class="cat-btn" id="btn_taffi_pay" onclick="selectCat('taffi_pay', this)">🐶<span>Taffi</span></div>
            <div class="cat-btn" id="btn_fixed" onclick="selectCat('fixed', this)">🏠<span>日常</span></div>
        </div>
        
        <div class="input-card">
            <div id="historyTags" class="history-tags"></div>
            <input type="text" id="itemName" class="item-text" placeholder="輸入內容 (如：午餐)">
            <input type="number" id="mainAmount" class="item-amt" inputmode="decimal" placeholder="$ 0">
        </div>

        <div class="cat-grid" style="grid-template-columns: repeat(2, 1fr); margin-top: 10px;">
            <div class="cat-btn" id="pay_cash" onclick="selectPay('cash', this, '#64748B')">💵 現金</div>
            <div class="cat-btn" id="pay_cathay" onclick="selectPay('cathay', this, '#00A650')">💳 國泰</div>
            <div class="cat-btn" id="pay_taishin" onclick="selectPay('taishin', this, '#DA2128')">💳 台新</div>
            <div class="cat-btn" id="pay_fubon" onclick="selectPay('fubon', this, '#0067B1')">💳 富邦</div>
        </div>
        <button class="submit-btn" onclick="submitExpense()">送出支出紀錄</button>
    </div>

    <div class="section-title">💳 信用卡帳單</div>
    <div id="bankArea"></div>
</div>

<script>
// 核心數據與邏輯維持 V28，針對 UI 修正 render 函數
const now = new Date();
let db = JSON.parse(localStorage.getItem("taffi_finance_v29")) || {
    carryOver: 0,
    budgets: { food: 9000, fun: 5000, taffi_pay: 3000, fixed: 1300 },
    expenses: [],
    catMemory: { food: {}, fun: {}, taffi_pay: {}, fixed: {} },
    banks: {
        cathay: { name: "國泰世華", bal: 56570, color: "#00A650" },
        taishin: { name: "台新(鎖)", bal: 22000, color: "#DA2128" },
        fubon: { name: "富邦銀行", bal: 36773, color: "#0067B1" }
    }
};

function changeMonth(m) {
    document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    // 這裡未來可以加入讀取不同月份資料的邏輯
    render(true);
}

function render(needAnim = true) {
    let sums = { food: 0, fun: 0, taffi_pay: 0, fixed: 0 };
    db.expenses.forEach(e => sums[e.cat] += e.amt);

    // 預算監控 (圖十修正)
    const catNames = { food: "🍽️ 食物", fun: "🎯 娛樂", taffi_pay: "🐶 Taffi", fixed: "🏠 日常支出" };
    let bHtml = "";
    for(let k in db.budgets) {
        let spent = sums[k], rem = db.budgets[k] - spent;
        let pct = Math.min(100, (spent/db.budgets[k])*100);
        bHtml += `<div class="budget-card">
            <div class="b-header"><span class="b-title">${catNames[k]}</span><span class="b-val">$${rem.toLocaleString()}</span></div>
            <div class="progress-container"><div class="progress-bar" style="width:${pct}%"></div></div>
        </div>`;
    }
    document.getElementById("budgetArea").innerHTML = bHtml;

    // 銀行帳單 (不使用 k)
    let bankHtml = "";
    for(let k in db.banks) {
        let b = db.banks[k];
        bankHtml += `<div style="display:flex; justify-content:space-between; padding:15px; background:white; border-radius:18px; margin-bottom:10px; border-left:5px solid ${b.color}">
            <b style="color:#64748B">${b.name}</b><span style="font-family:Montserrat; font-weight:900; color:${b.color}">$${b.bal.toLocaleString()}</span>
        </div>`;
    }
    document.getElementById("bankArea").innerHTML = bankHtml;
}

function selectCat(v, el) {
    document.querySelectorAll('.cat-btn').forEach(b => { if(!b.id.includes('pay')) b.classList.remove('active'); });
    el.classList.add('active');
}

function selectPay(v, el, color) {
    document.querySelectorAll('.cat-btn').forEach(b => { if(b.id.includes('pay')) { b.classList.remove('active'); b.style.backgroundColor=''; b.style.color=''; }});
    el.classList.add('active'); el.style.backgroundColor = color; el.style.color = 'white';
}

render(false);
</script>
</body>
</html>
