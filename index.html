<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taffi Finance Pro</title>

<style>
body{font-family:-apple-system;background:#f4f6f9;padding:15px;max-width:520px;margin:auto;}
.card{background:white;border-radius:18px;padding:15px;margin-bottom:15px;}
h3{margin:0 0 10px 0;}

.progress{
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}
.bar{
height:100%;
background:#4a90e2;
}

.row{display:flex;justify-content:space-between;margin:5px 0;}
input,select{width:100%;padding:10px;border-radius:10px;border:none;margin-top:5px;}
button{width:100%;padding:12px;border:none;border-radius:12px;background:#4a90e2;color:white;margin-top:10px;}
.small{font-size:0.8rem;color:#777;}
</style>
</head>

<body>

<!-- 總覽 -->
<div class="card">
<h3>📊 本月總覽</h3>
<div class="row">
<span>剩餘金額</span>
<span id="remain"></span>
</div>
<div class="row">
<span>每日可用</span>
<span id="daily"></span>
</div>
</div>

<!-- 記帳 -->
<div class="card">
<h3>➕ 記帳</h3>

<input id="amount" placeholder="金額">

<select id="type">
<option value="food">🍱 飲食</option>
<option value="fixed">📱 固定支出</option>
<option value="fun">🎬 娛樂</option>
</select>

<select id="pay">
<option value="cash">現金</option>
<option value="cathay">國泰</option>
<option value="fubon">富邦</option>
<option value="taishin">台新</option>
</select>

<button onclick="add()">新增</button>
</div>

<!-- 預算 -->
<div class="card">
<h3>📊 預算</h3>

<div>
飲食：<span id="food"></span>/9000
<div class="progress"><div id="barFood" class="bar"></div></div>
</div>

<div>
固定：<span id="fixed"></span>/1300
<div class="progress"><div id="barFixed" class="bar"></div></div>
</div>

<div>
娛樂：<span id="fun"></span>/5000
<div class="progress"><div id="barFun" class="bar"></div></div>
</div>

</div>

<!-- 信用卡 -->
<div class="card">
<h3>💳 信用卡</h3>

<div class="row"><span>國泰</span><span id="cathay"></span></div>
<div class="progress"><div id="barC1" class="bar"></div></div>

<div class="row"><span>富邦</span><span id="fubon"></span></div>
<div class="progress"><div id="barC2" class="bar"></div></div>

<div class="row"><span>台新</span><span id="taishin"></span></div>
<div class="progress"><div id="barC3" class="bar"></div></div>

<input id="payDebt" placeholder="還款金額">
<button onclick="payDebt()">記錄還款</button>

</div>

<!-- 存錢 -->
<div class="card">
<h3>🏦 存錢</h3>

機車保養：<span id="s1"></span>/3000
<div class="progress"><div id="barS1" class="bar"></div></div>

眉毛：<span id="s2"></span>/4500
<div class="progress"><div id="barS2" class="bar"></div></div>

保險：<span id="s3"></span>/3500
<div class="progress"><div id="barS3" class="bar"></div></div>

<button onclick="save()">存錢</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data"))||[];
let debt = JSON.parse(localStorage.getItem("debt"))||{cathay:56570,fubon:36773,taishin:22000};
let savings = JSON.parse(localStorage.getItem("savings"))||{s1:0,s2:0,s3:0};

function add(){
let amt = Number(amount.value);
let type = document.getElementById("type").value;
let payType = document.getElementById("pay").value;

data.push({amt,type});

if(payType!=="cash") debt[payType]+=amt;

saveAll();
render();
}

function payDebt(){
let amt = Number(payDebtInput.value);
debt.cathay -= amt;
saveAll();
render();
}

function save(){
savings.s1 += 500;
saveAll();
render();
}

function saveAll(){
localStorage.setItem("data",JSON.stringify(data));
localStorage.setItem("debt",JSON.stringify(debt));
localStorage.setItem("savings",JSON.stringify(savings));
}

function render(){

let food=0,fixed=0,fun=0;

data.forEach(d=>{
if(d.type==="food") food+=d.amt;
if(d.type==="fixed") fixed+=d.amt;
if(d.type==="fun") fun+=d.amt;
});

document.getElementById("food").innerText=food;
document.getElementById("fixed").innerText=fixed;
document.getElementById("fun").innerText=fun;

document.getElementById("barFood").style.width=(food/9000*100)+"%";
document.getElementById("barFixed").style.width=(fixed/1300*100)+"%";
document.getElementById("barFun").style.width=(fun/5000*100)+"%";

// 剩餘與每日
let remain = (9000-food)+(1300-fixed)+(5000-fun);
let today = new Date();
let last = new Date(today.getFullYear(), today.getMonth()+1, 0);
let daysLeft = last.getDate()-today.getDate();

document.getElementById("remain").innerText=remain;
document.getElementById("daily").innerText=Math.floor(remain/(daysLeft||1));

// 信用卡
document.getElementById("cathay").innerText=debt.cathay;
document.getElementById("fubon").innerText=debt.fubon;
document.getElementById("taishin").innerText=debt.taishin;

document.getElementById("barC1").style.width=(debt.cathay/60000*100)+"%";
document.getElementById("barC2").style.width=(debt.fubon/50000*100)+"%";
document.getElementById("barC3").style.width=(debt.taishin/50000*100)+"%";

// 存錢
document.getElementById("s1").innerText=savings.s1;
document.getElementById("s2").innerText=savings.s2;
document.getElementById("s3").innerText=savings.s3;

document.getElementById("barS1").style.width=(savings.s1/3000*100)+"%";
document.getElementById("barS2").style.width=(savings.s2/4500*100)+"%";
document.getElementById("barS3").style.width=(savings.s3/3500*100)+"%";

}

render();

</script>

</body>
</html>
