<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taffi Finance V10 - Debt Master</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
  --primary: #6C63FF; --danger: #FF5E5E; --warning: #FFA000; --success: #27AE60;
  --bg: #F8FAFC; --card: #FFFFFF; --text: #334155; --border: #E2E8F0;
  --cathay: #00A650; --taishin: #DA2128; --fubon: #0067B1;
}

body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; max-width: 500px; margin: auto; padding-bottom: 60px; }

/* 頂部總餘額大卡片 */
.header-card { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); border-radius: 25px; padding: 25px; margin-bottom: 20px; color: white; box-shadow: 0 10px 25px rgba(30, 41, 59, 0.2); text-align: center; }
.total-label { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
.total-val { font-family: 'Montserrat'; font-size: 40px; font-weight: 800; }

/* 信用卡強化版卡片 */
.bank-card { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.bank-tag { position: absolute; top: 0; left: 0; width: 6px; height: 100%; }
.bank-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.bank-name { font-weight: 800; font-size: 16px; color: #1E293B; }
.debt-amt { font-family: 'Montserrat'; font-size: 20px; font-weight: 800; }
.limit-info { font-size: 11px; color: #94A3B8; margin-top: 4px; }

/* 還款進度條 */
.repay-bar-bg { height: 6px; background: #F1F5F9; border-radius: 3px; margin: 12px 0; overflow: hidden; }
.repay-bar-fill { height: 100%; background: var(--success); transition: 0.5s; }

/* 輸入框優化 */
.input-group { display: flex; gap: 8px; margin-top: 10px; }
.repay-input { flex: 1; border: 1px solid var(--border); background: #F8FAFC; padding: 8px 12px; border-radius: 10px; font-size: 13px; }
.repay-btn { background: #F1F5F9; border: none; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; color: #475569; cursor: pointer; }

/* 常用卡片樣式 */
.card { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 18px; border: 1px solid var(--border); }
input, select { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: #F8FAFC; color: var(--text); margin-bottom: 12px; box-sizing: border-box; }
.btn { width: 100%; padding: 15px; border: none; border-radius: 16px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="header-card">
    <div class="total-label">💰 3 月份總餘額 (現金可用)</div>
    <div id="trueRemain" class="total-val">$0</div>
</div>

<div class="card">
    <div style="font-weight:700; margin-bottom:15px;">✍️ 快速記帳</div>
    <input type="text" id="itemName" placeholder="項目名稱">
    <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:10px;">
        <input type="number" id="itemPrice" placeholder="金額">
        <select id="itemCat">
            <option value="food">🍽️ 食物</option>
            <option value="fun">🎯 娛樂</option>
            <option value="fixed">🏠 固定</option>
            <option value="taffi_pay">🐶 Taffi 支出</option>
        </select>
    </div>
    <select id="itemPay">
        <option value="cash">💵 現金/金融卡</option>
        <option value="cathay">💳 國泰 (15日結)</option>
        <option value="taishin">💳 台新 (鎖卡中)</option>
        <option value="fubon">💳 富邦 (10日結)</option>
    </select>
    <button class="btn" onclick="addExpense()">確認扣款</button>
</div>

<div style="font-weight:700; margin: 25px 0 12px 8px; color:#64748B; font-size:14px; display:flex; justify-content:space-between;">
    <span>💳 信用卡還款進度</span>
    <span style="font-weight:normal; font-size:12px;">紅色代表額度緊張</span>
</div>
<div id="bankArea"></div>

<div style="font-weight:700; margin: 25px 0 12px 8px; color:#64748B; font-size:14px;">🏦 存錢筒累計</div>
<div id="savingsArea"></div>

<script>
let db = JSON.parse(localStorage.getItem("taffi_finance_v10")) || {
    income: 50000, // 假設月薪，請自行調整
    data: { 3: { expenses: [] } },
    budgets: { food: 9000, fun: 5000, fixed: 1300, taffi_pay: 2500 },
    banks: {
        cathay: { name: "國泰世華", bal: 56570, limit: 60000, color: "var(--cathay)", repaid: 0 },
        taishin: { name: "台新(鎖)", bal: 22000, limit: 50000, color: "var(--taishin)", repaid: 0 },
        fubon: { name: "富邦銀行", bal: 36773, limit: 50000, color: "var(--fubon)", repaid: 5000 }
    },
    savings: [
        { name: "機車保養", current: 0, target: 3000, type: "target" },
        { name: "年度保險", current: 0, target: 12000, type: "target" },
        { name: "眉毛美容", current: 0, target: 4500, type: "target" },
        { name: "Taffi 醫療金", current: 0, type: "infinite" },
        { name: "旅遊基金", current: 0, type: "infinite" }
    ]
};

function save() { localStorage.setItem("taffi_finance_v10", JSON.stringify(db)); }

function addExpense() {
    let price = Number(document.getElementById("itemPrice").value);
    let cat = document.getElementById("itemCat").value;
    let pay = document.getElementById("itemPay").value;
    if(!price) return;
    db.data[3].expenses.push({ price, cat, pay });
    if(pay !== 'cash') db.banks[pay].bal += price;
    save(); render();
    document.getElementById("itemPrice").value = "";
    document.getElementById("itemName").value = "";
}

function repayCard(bankKey) {
    let amt = Number(document.getElementById(`input_${bankKey}`).value);
    if(!amt) return;
    db.banks[bankKey].bal -= amt;
    db.banks[bankKey].repaid += amt; // 記錄本月還了多少
    save(); render();
    document.getElementById(`input_${bankKey}`).value = "";
}

function updateSaving(index, amt) {
    if(!amt) return;
    db.savings[index].current += Number(amt);
    save(); render();
}

function render() {
    let expenses = db.data[3].expenses;
    let totalSpent = expenses.reduce((a, b) => a + b.price, 0);
    let totalSaving = db.savings.reduce((a, b) => a + b.current, 0);
    
    // 更新總餘額
    document.getElementById("trueRemain").innerText = `$${(db.income - totalSpent - totalSaving).toLocaleString()}`;

    // 銀行渲染
    let bankHtml = "";
    for(let k in db.banks) {
        let b = db.banks[k];
        let usagePct = (b.bal / b.limit) * 100;
        let isDanger = usagePct > 85;
        
        bankHtml += `
        <div class="bank-card">
            <div class="bank-tag" style="background:${b.color}"></div>
            <div class="bank-header">
                <div>
                    <div class="bank-name">${b.name}</div>
                    <div class="limit-info">額度 $${b.limit.toLocaleString()} | 剩餘 $${(b.limit - b.bal).toLocaleString()}</div>
                </div>
                <div class="debt-amt" style="color:${isDanger ? 'var(--danger)' : '#1E293B'}">$${b.bal.toLocaleString()}</div>
            </div>
            
            <div style="font-size:11px; color:#64748B; display:flex; justify-content:space-between;">
                <span>本月已還: $${b.repaid.toLocaleString()}</span>
                <span>額度使用: ${Math.floor(usagePct)}%</span>
            </div>
            <div class="repay-bar-bg">
                <div class="repay-bar-fill" style="width:${usagePct}%; background:${isDanger ? 'var(--danger)' : b.color}"></div>
            </div>

            <div class="input-group">
                <input type="number" id="input_${k}" class="repay-input" placeholder="輸入本月撥款金額">
                <button class="repay-btn" onclick="repayCard('${k}')">還款</button>
            </div>
        </div>`;
    }
    document.getElementById("bankArea").innerHTML = bankHtml;

    // 存錢筒渲染
    let saveHtml = "";
    db.savings.forEach((s, i) => {
        saveHtml += `<div class="card" style="margin-bottom:10px; padding:15px; border-left: 5px solid var(--primary);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:700; font-size:14px;">${s.name}</span>
                <b style="color:var(--primary); font-size:16px;">$${s.current.toLocaleString()}</b>
            </div>
            <input type="number" placeholder="存入" style="width:100%; margin:8px 0 0; padding:6px; font-size:12px;" onchange="updateSaving(${i}, this.value); this.value=''">
        </div>`;
    });
    document.getElementById("savingsArea").innerHTML = saveHtml;
}

render();
</script>
</body>
</html>
