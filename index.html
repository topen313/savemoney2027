<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taffi Finance Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
  --primary: #8E97FD;
  --danger: #FF6B6B;
  --warning: #FFD166;
  --success: #06D6A0;
  --bg: #121212;
  --card: #1E1E26;
  --text: #E0E0E0;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0; padding: 15px;
  max-width: 480px; margin: auto;
}

/* 1️⃣ 首頁：核心負債與還款進度 */
.hero {
  background: linear-gradient(135deg, #6C63FF 0%, #8E97FD 100%);
  border-radius: 28px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
}
.hero-label { font-size: 13px; opacity: 0.8; font-weight: 400; }
.total-debt { font-family: 'Montserrat'; font-size: 38px; font-weight: 800; margin: 5px 0; }
.progress-container { background: rgba(255,255,255,0.2); height: 12px; border-radius: 10px; margin: 15px 0 8px; position: relative; overflow: hidden; }
.progress-fill { background: #FFF; height: 100%; border-radius: 10px; transition: 0.5s; }
.hero-footer { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; }

/* 2️⃣ 信用卡區 */
.card-unit {
  background: var(--card);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  border-left: 5px solid var(--primary);
}
.card-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; }
.limit-bar { height: 6px; background: #333; border-radius: 10px; margin-top: 5px; }
.limit-fill { height: 100%; border-radius: 10px; background: var(--primary); }
.warning { border-left-color: var(--danger); }
.locked-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

/* 3️⃣ 必存清單（存錢進度） */
.saving-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.saving-box { background: var(--card); padding: 15px; border-radius: 18px; text-align: center; }
.saving-val { color: var(--success); font-family: 'Montserrat'; font-weight: 800; font-size: 18px; margin-top: 5px; }

/* 選項與按鈕 */
.section-title { font-size: 18px; font-weight: 700; margin: 20px 0 10px; display: flex; align-items: center; }
.plan-card { background: #2A2A35; border-radius: 15px; padding: 15px; font-size: 14px; line-height: 1.6; color: #BBB; }
.highlight { color: var(--primary); font-weight: 700; }

input { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #2A2A35; color: white; margin-bottom: 10px; box-sizing: border-box; }
button { width: 100%; padding: 14px; border: none; border-radius: 15px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }

</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">💳 總負債 (Total Debt)</div>
  <div id="totalDebt" class="total-debt">$115,343</div>
  <div class="hero-label">🔥 本月還款目標：$15,000</div>
  <div class="progress-container">
    <div id="repayBar" class="progress-fill" style="width: 0%"></div>
  </div>
  <div class="hero-footer">
    <span id="paidAmt">已還: $0</span>
    <span id="repayPercent">0%</span>
  </div>
</div>

<div class="section-title">💳 信用卡即時狀態</div>
<div id="cardList"></div>

<div class="section-title">🏦 每月必存 (Must Save)</div>
<div class="saving-grid">
  <div class="saving-box">機車保養<div class="saving-val">$3,000</div></div>
  <div class="saving-box">眉毛<div class="saving-val">$4,500</div></div>
  <div class="saving-box">保險<div class="saving-val">$3,500</div></div>
</div>

<div class="section-title">🐾 彈性儲蓄 (Ongoing)</div>
<div class="saving-grid">
  <div class="saving-box">Taffi 醫療<div class="saving-val">$2,500</div></div>
  <div class="saving-box">旅遊金<div class="saving-val">$3,500</div></div>
</div>

<div class="section-title">💡 AI 還款策略 (雪球法)</div>
<div class="plan-card">
  根據目前的債務結構，建議優先處理 <span class="highlight">台新 (22,000)</span>。<br>
  本月 $15,000 分配建議：<br>
  📍 <span class="highlight">台新: $10,000</span> (加速解鎖)<br>
  📍 國泰: $3,000 / 富邦: $2,000
</div>

<div class="section-title">➕ 記錄還款</div>
<input type="number" id="payAmount" placeholder="輸入今日還款金額">
<select id="targetCard" style="width:100%; padding:12px; border-radius:12px; background:#2A2A35; color:white; border:none;">
  <option value="cathay">國泰</option>
  <option value="taishin">台新</option>
  <option value="fubon">富邦</option>
</select>
<button onclick="recordRepay()">更新還款進度</button>

<script>
// 初始化數據 (根據妳提供的 3/30 狀態)
let status = JSON.parse(localStorage.getItem("taffi_finance_v2")) || {
  paidThisMonth: 0,
  debt: {
    cathay: { bal: 56570, limit: 60000, locked: false },
    taishin: { bal: 22000, limit: 50000, locked: true },
    fubon: { bal: 36773, limit: 50000, locked: false }
  }
};

function recordRepay() {
  let amt = Number(document.getElementById("payAmount").value);
  let card = document.getElementById("targetCard").value;
  if(!amt) return;
  
  status.paidThisMonth += amt;
  status.debt[card].bal -= amt;
  
  localStorage.setItem("taffi_finance_v2", JSON.stringify(status));
  render();
  document.getElementById("payAmount").value = "";
}

function render() {
  let total = status.debt.cathay.bal + status.debt.taishin.bal + status.debt.fubon.bal;
  document.getElementById("totalDebt").innerText = `$${total.toLocaleString()}`;
  
  let p = Math.min((status.paidThisMonth / 15000) * 100, 100);
  document.getElementById("repayBar").style.width = p + "%";
  document.getElementById("paidAmt").innerText = `已還: $${status.paidThisMonth.toLocaleString()}`;
  document.getElementById("repayPercent").innerText = Math.floor(p) + "%";

  let cardHtml = "";
  for(let key in status.debt) {
    let c = status.debt[key];
    let useRate = Math.floor((c.bal / c.limit) * 100);
    let nameMap = {cathay: '國泰', taishin: '台新', fubon: '富邦'};
    
    cardHtml += `
      <div class="card-unit ${useRate > 80 ? 'warning' : ''}">
        <div class="card-header">
          <span>${nameMap[key]}${c.locked ? '<span class="locked-badge">鎖卡⚠️</span>' : ''}</span>
          <span>$${c.bal.toLocaleString()}</span>
        </div>
        <div class="hero-label">額度使用率: ${useRate}%</div>
        <div class="limit-bar"><div class="limit-fill" style="width:${useRate}%; background:${useRate > 90 ? '#FF6B6B' : '#8E97FD'}"></div></div>
      </div>
    `;
  }
  document.getElementById("cardList").innerHTML = cardHtml;
}

render();
</script>
</body>
</html>
